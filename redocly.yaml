plugins:
  - './openapi/plugins/scalekit.js'

apis:
  agentkit:
    root: openapi/scalekit.yaml
    output: public/api/agentkit.scalar.yaml
    decorators:
      scalekit/product:
        overlay: agentkit.yaml

  saaskit:
    root: openapi/scalekit.yaml
    output: public/api/saaskit.scalar.yaml
    decorators:
      scalekit/product:
        overlay: saaskit.yaml

  all:
    root: openapi/scalekit.yaml
    output: public/api/scalekit.scalar.yaml
    decorators:
      scalekit/product:
        overlay: all.yaml
