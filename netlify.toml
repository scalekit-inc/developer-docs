[build]
  command = "pnpm run build"
  publish = "dist"

[build.environment]
  NODE_OPTIONS = "--max_old_space_size=6144"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # Ensure Functions 2.0 format is used
  included_files = ["netlify/functions/**", "node_modules/canvaskit-wasm/bin/full/**"]

# Local dev: same as `pnpm run start` — `NETLIFY_DEV=1 astro dev` on port 4321.
# Declare `command` + `targetPort` so Netlify Dev matches astro.config server settings.
[dev]
  command = "pnpm run start"
  targetPort = 4321

[[edge_functions]]
  path = "/*"
  function = "track-agents"

# LLM-friendly files: fresh but cacheable (1 hour)
[[headers]]
  for = "/llms.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/llms-full.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/llms-small.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/_llms-txt/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=3600, stale-while-revalidate=86400"

# Sitemap: cacheable for 1 day
[[headers]]
  for = "/sitemap*.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400, s-maxage=86400, stale-while-revalidate=604800"

# OpenAPI/Postman JSON specs: 1 day cache
[[headers]]
  for = "/api/*.json"
  [headers.values]
    Cache-Control = "public, max-age=86400, s-maxage=86400, stale-while-revalidate=604800"

# Markdown API reference: 1 hour (generated from spec)
[[headers]]
  for = "/apis.md"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=3600, stale-while-revalidate=86400"