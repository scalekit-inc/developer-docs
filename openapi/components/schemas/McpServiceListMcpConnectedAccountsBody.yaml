type: object
required:
  - identifier
properties:
  identifier:
    description: Identifier for the end user whose connected accounts to retrieve
    type: string
    examples:
      - john.doe@example.com
  include_auth_link:
    description: >-
      When true, generates a fresh authentication link for each connection and
      creates connected accounts if they do not exist. When false or omitted,
      returns existing connected account status without creating accounts or
      generating links.
    type: boolean
