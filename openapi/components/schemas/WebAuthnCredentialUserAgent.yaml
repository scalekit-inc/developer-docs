type: object
properties:
  browser:
    description: Browser name (e.g., "Chrome", "Safari")
    type: string
    examples:
      - Chrome
  browser_version:
    description: Browser version number
    type: string
    examples:
      - 120.0.6099.129
  device_model:
    description: Device model if available
    type: string
    examples:
      - iPhone15,2
  device_type:
    description: 'Device type: "desktop", "mobile", or "tablet"'
    type: string
    examples:
      - mobile
  os:
    description: Operating system name (e.g., "Windows", "iOS")
    type: string
    examples:
      - macOS
  os_version:
    description: Operating system version
    type: string
    examples:
      - '14.2'
  raw:
    description: Raw user agent string from the browser
    type: string
  url:
    description: Parsed user agent URL reference
    type: string
