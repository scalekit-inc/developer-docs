type: object
properties:
  auth_patterns:
    description: Authentication patterns for the connected app provider
    type: array
    items:
      type: object
  description:
    description: Description of the connected app provider
    type: string
    examples:
      - Connect to Google Workspace for email and calendar integration
  display_name:
    description: Display name for the connected app provider
    type: string
    examples:
      - Google Workspace
  icon_src:
    description: >-
      URL for the provider icon. Should be an SVG image sized 800x800 pixels for
      best rendering experience.
    type: string
    examples:
      - https://example.com/images/my-connector.svg
  metadata:
    description: >-
      Custom key-value metadata for this provider. Keys must be 3-25 characters,
      values must be 1-256 characters, with a maximum of 20 key-value pairs.
    type: object
    additionalProperties:
      type: string
    examples:
      - api_version: v2
        region: us-east-1
  proxy_enabled:
    description: >-
      This flag indicates whether proxying is turned on for the connected app
      provider. When enabled, requests are routed through the provider proxy
      instead of being sent directly.
    type: boolean
    examples:
      - true
  proxy_url:
    description: Proxy URL for the connected app provider. Must start with https://
    type: string
    examples:
      - https://mcp.example.com/mcp
