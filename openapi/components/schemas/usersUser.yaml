type: object
properties:
  create_time:
    description: >-
      Timestamp when the user account was initially created. Automatically set
      by the server.
    type: string
    format: date-time
    readOnly: true
  email:
    description: >-
      Primary email address for the user. Must be unique across the environment
      and valid per RFC 5322.
    type: string
    examples:
      - user@example.com
  external_id:
    description: >-
      Your application's unique identifier for this organization, used to link
      Scalekit with your system.
    type: string
    examples:
      - ext_12345a67b89c
  id:
    description: Unique system-generated identifier for the user. Immutable once created.
    type: string
    examples:
      - usr_1234abcd5678efgh
  last_login_time:
    description: >-
      Timestamp of the user's most recent successful authentication. Updated
      automatically.
    type: string
    format: date-time
    readOnly: true
  memberships:
    description: >-
      List of organization memberships. Automatically populated based on group
      assignments.
    type: array
    items:
      type: object
      $ref: ./commonsOrganizationMembership.yaml
  metadata:
    description: >-
      Custom key-value pairs for storing additional user context. Keys (3-25
      chars), values (1-256 chars).
    type: object
    additionalProperties:
      type: string
    examples:
      - department: engineering
        location: nyc-office
  update_time:
    description: >-
      Timestamp of the last modification to the user account. Automatically
      updated by the server.
    type: string
    format: date-time
    readOnly: true
  user_profile:
    description: >-
      User's personal information including name, address, and other profile
      attributes.
    $ref: ./commonsUserProfile.yaml
