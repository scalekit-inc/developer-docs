description: >-
  AuthenticatedClients represents an authenticated client in a session along
  with its organization context.
type: object
properties:
  client_id:
    description: Unique identifier of the authenticated client application.
    type: string
    examples:
      - skc_1234567890
  organization_id:
    description: >-
      Active or last active Organization ID associated with the authenticated
      client.
    type: string
    examples:
      - org_1234567890
