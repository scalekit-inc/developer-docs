type: object
properties:
  field_name:
    description: >-
      Name of the field in which scope should be sent in the authentication
      request. This is required by some identity providers that expect scopes to
      be sent in a custom field instead of the standard 'scope' parameter.
    type: string
    examples:
      - optional_scope or bot_scope
  scopes:
    description: List of optional scopes that can be requested during authentication
    type: array
    items:
      type: string
    examples:
      - - scope1
        - scope2
