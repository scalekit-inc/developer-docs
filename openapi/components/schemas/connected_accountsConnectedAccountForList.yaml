type: object
title: >-
  Connected account summary for list operations - excludes sensitive
  authorization details
properties:
  authorization_type:
    description: Authorization mechanism type.
    $ref: ./connected_accountsConnectorType.yaml
  connection_id:
    description: Parent connection configuration reference.
    type: string
    examples:
      - conn_24834495392086178
  connector:
    description: Connector identifier.
    type: string
    examples:
      - notion
  id:
    description: Unique connected account identifier.
    type: string
    examples:
      - ca_24834495392086178
  identifier:
    description: The unique identifier for this account in the third-party service.
    type: string
    examples:
      - user@example.com
  last_used_at:
    description: Last usage timestamp.
    type: string
    format: date-time
    examples:
      - '2024-03-20T14:30:00Z'
  provider:
    description: OAuth provider name (e.g., 'google', 'microsoft').
    type: string
    examples:
      - google
  status:
    description: Current connection status.
    $ref: ./connected_accountsConnectorStatus.yaml
  token_expires_at:
    description: Token expiration timestamp.
    type: string
    format: date-time
    examples:
      - '2024-12-31T23:59:59Z'
  updated_at:
    description: Last modification timestamp.
    type: string
    format: date-time
    examples:
      - '2024-03-20T15:04:05Z'
