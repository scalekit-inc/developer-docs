type: object
properties:
  domains:
    description: >-
      Array of domain objects containing all domain details including
      verification status and configuration.
    type: array
    items:
      type: object
      $ref: ./domainsDomain.yaml
  page_number:
    description: Current page number in the pagination sequence.
    type: integer
    format: int32
    examples:
      - 1
  page_size:
    description: Number of domains returned in this page.
    type: integer
    format: int32
    examples:
      - 1
