type: object
properties:
  audience:
    description: >-
      The intended recipients of the access tokens issued to this client. Each
      audience value should be a URI that identifies the API or service that
      will validate the token.
    type: array
    items:
      type: string
    examples:
      - - https://api.example.com/api/analytics
        - https://deployment-api.acmecorp.com
  custom_claims:
    description: >-
      Additional claims to be included in access tokens issued to this client.
      These claims provide context about the client and can be used for
      authorization decisions. Keep claims minimal to avoid increasing token
      size.
    type: array
    items:
      type: object
      $ref: ./clientsCustomClaim.yaml
    examples:
      - - key: environment
          value: production
        - key: service
          value: deployment
  description:
    description: >-
      A detailed explanation of the client's purpose and usage. This helps
      administrators understand what the client is used for and who manages it.
    type: string
    examples:
      - Service account for GitHub Actions to deploy resources to production
  expiry:
    description: Expiry time in seconds for the token generated by the client
    type: string
    format: int64
    examples:
      - 3600
  name:
    description: >-
      A descriptive name for the API client that helps identify its purpose.
      This name is displayed in the dashboard and logs. Must be between 1 and
      128 characters.
    type: string
    examples:
      - GitHub Actions Deployment Service
  scopes:
    description: >-
      OAuth 2.0 scopes that define the permissions granted to this client. Each
      scope represents a specific permission or set of permissions. The client
      can only access resources that match its granted scopes.
    type: array
    items:
      type: string
    examples:
      - - deploy:resources
        - read:deployments
