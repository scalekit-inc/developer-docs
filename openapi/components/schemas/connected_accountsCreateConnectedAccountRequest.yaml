type: object
properties:
  connected_account:
    description: Details of the connected account to create
    $ref: ./v1connected_accountsCreateConnectedAccount.yaml
    examples:
      - authorization_details:
          oauth_token:
            access_token: ...
            refresh_token: ...
            scopes:
              - read
              - write
        authorization_type: OAUTH2
  connector:
    description: >-
      Connector identifier (e.g., 'notion', 'slack', 'google'). Alphanumeric
      characters, spaces, hyphens, underscores, and colons are allowed.
    type: string
    examples:
      - notion
  identifier:
    description: >-
      The unique identifier for the connected account within the third-party
      service (e.g., email address, user ID, workspace identifier).
    type: string
    examples:
      - user@example.com
  organization_id:
    description: Organization ID for the connector
    type: string
    examples:
      - org_121312434123312
  user_id:
    description: User ID for the connector
    type: string
    examples:
      - user_121312434123312
