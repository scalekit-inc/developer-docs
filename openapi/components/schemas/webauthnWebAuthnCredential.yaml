type: object
properties:
  attestation_type:
    description: 'Type of attestation: "none", "indirect", or "direct"'
    type: string
    examples:
      - direct
  authenticator:
    description: Authenticator information including model and name
    $ref: ./WebAuthnCredentialAuthenticator.yaml
  authenticator_flags:
    description: Flags indicating authenticator capabilities
    $ref: ./WebAuthnCredentialAuthenticatorFlags.yaml
  client_info:
    description: Geographic and network information from registration
    $ref: ./WebAuthnCredentialClientInfo.yaml
  created_at:
    description: Timestamp when the credential was created
    type: string
    format: date-time
    examples:
      - '2025-02-15T06:23:44.560000Z'
  credential_id:
    description: The actual credential ID bytes from the authenticator
    type: string
    contentEncoding: base64
  display_name:
    description: Optional user-friendly name for this passkey
    type: string
    examples:
      - My Yubikey
  id:
    description: Credential unique identifier
    type: string
    examples:
      - cred_abc123
  transports:
    description: Supported transports for this credential
    type: array
    items:
      type: string
  updated_at:
    description: Timestamp of last update
    type: string
    format: date-time
    examples:
      - '2025-02-15T06:23:44.560000Z'
  user_agent:
    description: Browser and device information from registration
    $ref: ./WebAuthnCredentialUserAgent.yaml
  user_id:
    description: User ID this credential belongs to
    type: string
    examples:
      - user_xyz789
