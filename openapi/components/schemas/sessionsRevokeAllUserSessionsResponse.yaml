type: object
properties:
  revoked_sessions:
    description: >-
      List of all sessions that were revoked, including detailed information for
      each revoked session with IDs, timestamps, and device details.
    type: array
    items:
      type: object
      $ref: ./sessionsRevokedSessionDetails.yaml
  total_revoked:
    description: >-
      Total count of active sessions that were revoked. Useful for confirmation
      and audit logging.
    type: integer
    format: int64
    examples:
      - 5
