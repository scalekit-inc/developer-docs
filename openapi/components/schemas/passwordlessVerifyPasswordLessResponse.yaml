type: object
properties:
  email:
    description: >-
      Email address of the successfully authenticated user. This confirms which
      email account was verified through the passwordless flow.
    type: string
    readOnly: true
    examples:
      - john.doe@example.com
  passwordless_type:
    description: >-
      The type of passwordless authentication that was successfully verified,
      confirming which method the user completed.
    $ref: ./authpasswordlessPasswordlessType.yaml
    examples:
      - OTP
  state:
    description: >-
      The custom state parameter that was provided in the original
      authentication request, returned unchanged. Use this to restore your
      application's context after authentication.
    type: string
    readOnly: true
    examples:
      - kdt7yiag28t341fr1
  template:
    description: >-
      Specifies which email template to choose. For User Signin choose SIGNIN
      and for User Signup use SIGNUP
    $ref: ./passwordlessTemplateType.yaml
    examples:
      - SIGNIN
