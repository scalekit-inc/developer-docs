type: object
properties:
  groups:
    description: List of directory groups retrieved from the specified directory
    type: array
    items:
      type: object
      $ref: ./directoriesDirectoryGroup.yaml
  next_page_token:
    description: >-
      Token to retrieve the next page of results. Use this token in the
      'page_token' field of the next request
    type: string
  prev_page_token:
    description: >-
      Token to retrieve the previous page of results. Use this token in the
      'page_token' field of the next request
    type: string
  total_size:
    description: >-
      Total number of groups matching the request criteria, regardless of
      pagination
    type: integer
    format: int64
