type: object
properties:
  display_name:
    description: Human-readable name for the role
    type: string
    examples:
      - Dev Team
  id:
    description: Role ID
    type: string
    readOnly: true
    examples:
      - role_79643236410327240
  name:
    description: >-
      Attribute name/identifier for the role used in system operations and API
      calls. This should be a machine-readable identifier that follows naming
      conventions.
    type: string
    examples:
      - team_dev
