type: object
properties:
  description:
    description: >-
      Detailed description of the role's purpose, capabilities, and intended use
      cases. Maximum 2000 characters.
    type: string
    examples:
      - >-
        Can create, edit, and publish content but cannot delete content or
        manage user accounts
  display_name:
    description: >-
      Human-readable display name for the role. Used in user interfaces,
      reports, and user-facing communications.
    type: string
    examples:
      - Content Editor
  extends:
    description: >-
      Name of the base role that this role extends. Enables hierarchical role
      inheritance where this role inherits all permissions from the base role.
    type: string
    examples:
      - viewer
  name:
    description: >-
      Unique name identifier for the role. Must be alphanumeric with
      underscores, 1-64 characters. This name is used in API calls and cannot be
      changed after creation.
    type: string
    examples:
      - content_editor
  permissions:
    description: >-
      List of permission names to assign to this role. Permissions must exist in
      the current environment. Maximum 100 permissions per role.
    type: array
    items:
      type: string
    examples:
      - - read:content
        - write:content
        - publish:content
