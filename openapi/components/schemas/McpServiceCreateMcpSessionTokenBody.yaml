type: object
required:
  - identifier
properties:
  expiry:
    description: >-
      Optional token lifetime. Must be between 60s and 24h. Defaults to 1h when
      omitted.
    type: string
    examples:
      - 3600s
  identifier:
    description: >-
      Upstream-provider identifier (typically the user's email or provider
      user-id) shared by the connected accounts the token represents. A single
      identifier can map to one connected account per connection in the MCP
      configuration.
    type: string
    maxLength: 255
    minLength: 1
    examples:
      - alice@acme.com
