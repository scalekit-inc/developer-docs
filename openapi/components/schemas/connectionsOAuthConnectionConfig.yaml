type: object
properties:
  access_type:
    description: Access Type
    type: string
    examples:
      - offline
  app_name:
    description: >-
      Application name used by providers that require it as an authorize query
      parameter (e.g., Trello's app_name).
    type: string
    examples:
      - My Trello App
  authorize_uri:
    description: Authorize URI
    type: string
    examples:
      - https://youridp.com/service/oauth/authorize
  client_id:
    description: Client ID
    type: string
    examples:
      - oauth_client_id
  client_secret:
    description: Client Secret
    type: string
    examples:
      - oauth_client_secret
  custom_scope_name:
    description: Custom Scope Name
    type: string
    examples:
      - user_scope
  is_cimd:
    description: >-
      Indicates whether this connection was registered using Client ID Metadata
      Document (CIMD) instead of Dynamic Client Registration.
    type: boolean
    readOnly: true
    examples:
      - true
  optional_scopes:
    description: >-
      Optional scopes configuration for identity providers that support or
      require additional scopes to be sent in a custom field during
      authentication requests.
    $ref: ./connectionsOptionalScopes.yaml
  pkce_enabled:
    description: PKCE Enabled
    type: boolean
    examples:
      - true
  prompt:
    description: Prompt for the user
    type: string
    examples:
      - none
  redirect_uri:
    description: Redirect URI
    type: string
    examples:
      - https://yourapp.com/service/oauth/redirect
  scopes:
    description: OIDC Scopes
    type: array
    items:
      type: string
    examples:
      - - openid
        - profile
  sync_user_profile_on_login:
    description: >-
      Indicates whether user profiles should be synchronized with the identity
      provider upon each log-in.
    type: boolean
    examples:
      - true
  tenant_id:
    description: >-
      Microsoft Entra tenant ID. Required when using a single-tenant or
      multi-tenant app registered in Microsoft Entra. Leave empty to use the
      common endpoint.
    type: string
    examples:
      - xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
  token_access_type:
    description: Token Access Type
    type: string
    examples:
      - offline
  token_uri:
    description: Token URI
    type: string
    examples:
      - https://youridp.com/service/oauth/token
  use_platform_creds:
    description: Use Scalekit credentials
    type: boolean
    examples:
      - true
  user_info_uri:
    description: User Info URI
    type: string
    examples:
      - https://youridp.com/service/oauth/userinfo
