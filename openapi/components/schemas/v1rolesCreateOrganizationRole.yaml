type: object
properties:
  description:
    description: Description of the organization's role
    type: string
    examples:
      - Organization Viewer Role will be used only for viewing the objects
  display_name:
    description: Display name of the organization's role
    type: string
    examples:
      - Organization Viewer Role
  extends:
    description: Base role name for hierarchical roles
    type: string
    examples:
      - admin_role
  name:
    description: Unique name of the organization's role
    type: string
    examples:
      - org_viewer_role
  permissions:
    description: >-
      List of permission names to assign to this role. Permissions must exist in
      the current environment.
    type: array
    items:
      type: string
    examples:
      - - read:users
        - write:documents
