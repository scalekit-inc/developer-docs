type: object
properties:
  expires_at:
    description: Absolute time at which the token expires. Equals issued_at + expiry.
    type: string
    format: date-time
    readOnly: true
  token:
    description: >-
      Signed JWT (RS256) whose `sub` claim is the supplied identifier and whose
      `aud` claim is the MCP server URL bound to the configuration. Payload also
      carries the MCP configuration ID (`mcp_cfg`) and the resolved
      connected-account IDs (`ca_ids`). Signed with the calling environment's
      active JWT signing key.
    type: string
    readOnly: true
    examples:
      - >-
        eyJhbGciOiJSUzI1NiIsImtpZCI6InNua18xMjMifQ.eyJhdWQiOlsiYWxpY2VAYWNtZS5jb20iXSwidG9rZW5fdHlwZSI6Im1jcF9zZXNzaW9uIn0.signature
