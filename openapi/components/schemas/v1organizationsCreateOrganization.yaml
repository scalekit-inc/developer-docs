type: object
required:
  - display_name
properties:
  display_name:
    description: Name of the organization. Must be between 1 and 200 characters.
    type: string
    examples:
      - Megasoft Inc
  external_id:
    description: >-
      Your application's unique identifier for this organization, used to link
      Scalekit with your system.
    type: string
    examples:
      - my_unique_id
  logo_url:
    description: >-
      HTTPS URL of the organization's logo image. Maximum 1024 characters. Must
      use the https scheme.
    type: string
    format: uri
    maxLength: 1024
    pattern: ^https://
    examples:
      - https://cdn.example.com/acme-logo.png
  metadata:
    type: object
    additionalProperties:
      type: string
  slug:
    description: >-
      Slug for dynamic redirect URI resolution. A single DNS label (e.g. acme)
      or hostname (e.g. oauth.pstmn.io). Lowercase alphanumeric, hyphens, and
      dots. Max 253 chars. Unique per environment.
    type: string
    maxLength: 253
    minLength: 1
    pattern: >-
      ^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?(?:\.[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?)*$
    examples:
      - acme
