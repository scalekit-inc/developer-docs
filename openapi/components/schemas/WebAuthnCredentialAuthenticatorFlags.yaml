type: object
properties:
  backup_eligible:
    description: Whether this credential can be backed up to another device
    type: boolean
  backup_state:
    description: Whether this credential was synced or backed up
    type: boolean
  user_present:
    description: Whether the user was present during authentication
    type: boolean
  user_verified:
    description: Whether the user was verified (e.g., fingerprint, PIN)
    type: boolean
