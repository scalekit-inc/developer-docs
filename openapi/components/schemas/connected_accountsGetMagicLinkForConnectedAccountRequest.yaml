type: object
properties:
  connector:
    description: >-
      Connector identifier (e.g., 'notion', 'slack', 'google'). Alphanumeric
      characters, spaces, hyphens, underscores, and colons are allowed.
    type: string
    examples:
      - notion
  id:
    description: Unique identifier for the connected account
    type: string
    examples:
      - ca_123
  identifier:
    description: >-
      The unique identifier for the connected account within the third-party
      service (e.g., email address, user ID, workspace identifier).
    type: string
    examples:
      - user@example.com
  organization_id:
    description: Organization ID for the connector
    type: string
    examples:
      - org_121312434123312
  state:
    description: >-
      Optional opaque state value. State added to the user verify redirect URL
      query params to validate the user verification
    type: string
    examples:
      - QVNDSUFyY2hhYml0dGVyXzE2ODQ5NzIwNzI0NTY=
  user_id:
    description: User ID for the connector
    type: string
    examples:
      - user_121312434123312
  user_verify_url:
    description: B2B app's user verify redirect URL
    type: string
    examples:
      - https://app.yourapp.com/user/verify/callback
