type: object
properties:
  next_page_token:
    description: >-
      Opaque token for retrieving the next page of results. Empty if there are
      no more pages.
    type: string
    examples:
      - eyJwYWdlIjogMiwgImxhc3RfaWQiOiAidXNyXzEyMzQ1In0=
  prev_page_token:
    description: >-
      Opaque token for retrieving the previous page of results. Empty for the
      first page.
    type: string
    examples:
      - eyJwYWdlIjogMCwgImZpcnN0X2lkIjogInVzcl85ODc2NSJ9
  total_size:
    description: >-
      Total number of users matching the request criteria, regardless of
      pagination.
    type: integer
    format: int64
    examples:
      - 1042
  users:
    description: >-
      List of user objects for the current page. May contain fewer entries than
      requested page_size.
    type: array
    items:
      type: object
      $ref: ./usersUser.yaml
