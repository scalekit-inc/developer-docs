type: object
properties:
  certificate:
    description: IDP Certificate
    type: string
  create_time:
    description: Certificate Creation Time
    type: string
    format: date-time
    examples:
      - '2021-09-01T00:00:00Z'
  expiry_time:
    description: Certificate Expiry Time
    type: string
    format: date-time
    examples:
      - '2021-09-01T00:00:00Z'
  id:
    description: Certificate ID
    type: string
    examples:
      - cert_123123123123
  issuer:
    description: Certificate Issuer
    type: string
    examples:
      - https://youridp.com/service/saml
