type: object
properties:
  absolute_session_timeout:
    description: >-
      The absolute session timeout value. The unit is specified by
      absolute_session_timeout_unit. Omit when policy_source is APPLICATION.
    type: integer
    format: int32
    examples:
      - 360
  absolute_session_timeout_unit:
    description: >-
      Unit for absolute_session_timeout. Accepted values: 'MINUTES', 'HOURS',
      'DAYS'. Defaults to MINUTES.
    $ref: ./commonsTimeUnit.yaml
    examples:
      - MINUTES
  idle_session_timeout:
    description: >-
      The idle session timeout value. The unit is specified by
      idle_session_timeout_unit. Omit when idle_session_timeout_enabled is
      false.
    type: integer
    format: int32
    examples:
      - 84
  idle_session_timeout_enabled:
    description: >-
      Whether idle session timeout is enabled. Omit when policy_source is
      APPLICATION.
    type: boolean
    examples:
      - true
  idle_session_timeout_unit:
    description: >-
      Unit for idle_session_timeout. Accepted values: 'MINUTES', 'HOURS',
      'DAYS'. Defaults to MINUTES.
    $ref: ./commonsTimeUnit.yaml
    examples:
      - MINUTES
  policy_source:
    description: >-
      Policy source. Send 'APPLICATION' to revert to application defaults. Send
      'CUSTOM' with timeout values to activate a custom policy.
    $ref: ./organizationsSessionPolicyType.yaml
    examples:
      - CUSTOM
