type: object
properties:
  next_page_token:
    description: >-
      Token for pagination. Use this token in the 'page_token' field of the next
      request to fetch the subsequent page of users
    type: string
  prev_page_token:
    description: >-
      Token for pagination. Use this token in the 'page_token' field of the next
      request to fetch the prior page of users
    type: string
  total_size:
    description: >-
      Total number of users available in the directory that match the request
      criteria
    type: integer
    format: int64
  users:
    description: List of directory users retrieved from the specified directory
    type: array
    items:
      type: object
      $ref: ./directoriesDirectoryUser.yaml
