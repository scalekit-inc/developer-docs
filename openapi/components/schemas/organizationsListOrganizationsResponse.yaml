type: object
properties:
  next_page_token:
    description: >-
      Pagination token for the next page of results. Use this token to fetch the
      next page.
    type: string
    examples:
      - <next_page_token>
  organizations:
    description: List of organization objects
    type: array
    items:
      type: object
      $ref: ./organizationsOrganization.yaml
  prev_page_token:
    description: >-
      Pagination token for the previous page of results. Use this token to fetch
      the previous page.
    type: string
    examples:
      - <prev_page_token>
  total_size:
    description: Total number of organizations in the environment.
    type: integer
    format: int64
    examples:
      - 30
