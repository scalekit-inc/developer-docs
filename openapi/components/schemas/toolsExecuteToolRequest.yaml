type: object
properties:
  agent_run_id:
    description: >-
      Optional. Customer-supplied identifier grouping multiple tool calls into a
      single agent run. Useful for correlating logs across an agentic workflow.
    type: string
    examples:
      - run_abc123
  connected_account_id:
    description: >-
      Optional. The unique ID of the connected account. Use this to directly
      identify the connected account instead of using identifier + connector
      combination.
    type: string
    examples:
      - ca_123
  connector:
    description: >-
      Optional. The name of the connector/provider (e.g., 'Google Workspace',
      'Slack', 'Notion'). Alphanumeric characters, spaces, hyphens, underscores,
      and colons are allowed. Use this in combination with identifier to
      identify the connected account.
    type: string
    examples:
      - Google Workspace
  identifier:
    description: >-
      Optional. The unique identifier for the connected account within the
      third-party service (e.g., email address, user ID, workspace identifier).
      Use this in combination with connector to identify the connected account.
    type: string
    examples:
      - user@example.com
  organization_id:
    description: >-
      Optional. The organization ID to scope the connected account lookup. Use
      this to narrow down the search when the same identifier exists across
      multiple organizations.
    type: string
    examples:
      - org_123
  params:
    description: >-
      JSON object containing the parameters required for tool execution. The
      structure depends on the specific tool being executed.
    type: object
    examples:
      - body: Hello World
        subject: Hello
        to: user@example.com
  tool_name:
    description: Name of the tool to execute
    type: string
    examples:
      - send_email
  user_id:
    description: >-
      Optional. The user ID to scope the connected account lookup. Use this to
      narrow down the search when the same identifier exists across multiple
      users.
    type: string
    examples:
      - user_123
