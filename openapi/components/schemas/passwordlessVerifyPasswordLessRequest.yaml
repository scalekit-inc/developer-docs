type: object
properties:
  auth_request_id:
    description: >-
      The authentication request identifier returned from the send passwordless
      email endpoint. Required when verifying OTP codes to link the verification
      with the original request.
    type: string
    examples:
      - h5Y8kT5RVwaea5WEgW4n-6C-aO_-fuTUW7Vb9-Rh3AcY9qxZqQ
  code:
    description: >-
      The Verification Code (OTP) received via email. This is typically a
      6-digit numeric code that users enter manually to verify their identity.
    type: string
    examples:
      - '123456'
  link_token:
    description: >-
      The unique token from the magic link URL received via email. Extract this
      token when users click the magic link and are redirected to your
      application to later verify the user.
    type: string
    examples:
      - afe9d61c-d80d-4020-a8ee-61765ab71cb3
