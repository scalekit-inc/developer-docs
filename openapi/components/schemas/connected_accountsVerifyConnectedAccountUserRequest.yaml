type: object
required:
  - auth_request_id
  - identifier
properties:
  auth_request_id:
    description: >-
      Auth request ID as base64url-encoded opaque token from the user verify
      redirect URL query params
    type: string
    examples:
      - QVNDSUFyY2hhYml0dGVyXzE2ODQ5NzIwNzI0NTY=
  identifier:
    description: Current logged in user's connected account identifier
    type: string
    examples:
      - user@example.com
