type: object
properties:
  email:
    description: >-
      Email address where the passwordless authentication credentials will be
      sent. Must be a valid email format.
    type: string
    examples:
      - john.doe@example.com
  expires_in:
    description: >-
      Time in seconds until the passwordless authentication expires. If not
      specified, defaults to 300 seconds (5 minutes)
    type: integer
    format: int64
    examples:
      - 300
  magiclink_auth_uri:
    description: >-
      Your application's callback URL where users will be redirected after
      clicking the magic link in their email. The link token will be appended as
      a query parameter as link_token
    type: string
    examples:
      - https://yourapp.com/auth/passwordless/callback
  state:
    description: >-
      Custom state parameter that will be returned unchanged in the verification
      response. Use this to maintain application state between the
      authentication request and callback, such as the intended destination
      after login
    type: string
    examples:
      - d62ivasry29lso
  template:
    description: >-
      Specifies the authentication intent for the passwordless request. Use
      SIGNIN for existing users or SIGNUP for new user registration. This
      affects the email template and user experience flow.
    $ref: ./passwordlessTemplateType.yaml
    examples:
      - SIGNIN
  template_variables:
    description: >-
      A set of key-value pairs to personalize the email template.


      * You may include up to 30 key-value pairs.

      * The following variable names are reserved by the system and cannot be
      supplied: `otp`, `expiry_time_relative`, `link`, `expire_time`,
      `expiry_time`.

      * Every variable referenced in your email template must be included as a
      key-value pair.


      Use these variables to insert custom information, such as a team name, URL
      or the user's employee ID. All variables are interpolated before the email
      is sent, regardless of the email provider.
    type: object
    additionalProperties:
      type: string
    examples:
      - custom_variable_key: custom_variable_value
