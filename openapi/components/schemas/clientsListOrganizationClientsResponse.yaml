description: >-
  Response message containing a paginated list of API clients for the specified
  organization.
type: object
title: List Organization Clients Response
properties:
  clients:
    description: >-
      List of API client objects for the organization. Each client includes its
      configuration, metadata, and active secrets (without exposing actual
      secret values).
    type: array
    title: List of organization API clients
    items:
      type: object
      $ref: ./clientsM2MClient.yaml
  next_page_token:
    description: >-
      Pagination token for the next page of results. Use this token to fetch the
      next page.
    type: string
    title: Pagination token for the next page of results
    examples:
      - <next_page_token>
  prev_page_token:
    description: >-
      Pagination token for the previous page of results. Use this token to fetch
      the previous page.
    type: string
    title: Pagination token for the previous page of results
    examples:
      - <prev_page_token>
  total_size:
    description: Total number of API clients in the organization.
    type: integer
    format: int64
    title: Total number of clients in the organization
    examples:
      - 30
