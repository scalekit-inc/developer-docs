type: object
title: OAuth 2.0 access and refresh tokens with scopes
properties:
  access_token:
    description: >-
      OAuth access token for API requests. Typically short-lived and must be
      refreshed after expiration.
    type: string
    examples:
      - ya29.a0AfH6SMBx...
  domain:
    description: >-
      Associated domain for workspace or organization-scoped OAuth connections
      (e.g., Google Workspace domain).
    type: string
    examples:
      - example.com
  refresh_token:
    description: >-
      OAuth refresh token for obtaining new access tokens. Long-lived and used
      to maintain persistent authorization.
    type: string
    examples:
      - 1//0gHJxZ-Lb2...
  scopes:
    description: >-
      List of granted OAuth scopes defining the permissions and access levels
      for this connection.
    type: array
    items:
      type: string
    examples:
      - - https://www.googleapis.com/auth/drive.readonly
        - https://www.googleapis.com/auth/userinfo.email
