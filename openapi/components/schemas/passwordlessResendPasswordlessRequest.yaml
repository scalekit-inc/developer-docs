type: object
properties:
  auth_request_id:
    description: >-
      The authentication request identifier from the original send passwordless
      email request. Use this to resend the Verification Code (OTP) or Magic
      Link to the same email address.
    type: string
    examples:
      - h5Y8kT5RVwaea5WEgW4n-6C-aO_-fuTUW7Vb9-Rh3AcY9qxZqQ
