type: object
properties:
  accepted_at:
    description: Timestamp when the user accepted the invitation.
    type: string
    format: date-time
  created_at:
    description: Timestamp when the invitation was created.
    type: string
    format: date-time
  display_name:
    description: >-
      Organization display name. This field stores a user-friendly name for the
      organization that may be different from the formal name, often used for UI
      display purposes.
    type: string
    examples:
      - Acme Corporation
  expires_at:
    description: Timestamp when the invitation expired.
    type: string
    format: date-time
  inviter_email:
    description: ID of the user who invited this user.
    type: string
  join_time:
    description: >-
      Timestamp when the membership was created. Automatically set by the
      server.
    type: string
    format: date-time
  membership_status:
    $ref: ./commonsMembershipStatus.yaml
  metadata:
    description: >-
      Custom key-value pairs for storing additional user context. Keys (3-25
      chars), values (1-256 chars).
    type: object
    additionalProperties:
      type: string
    examples:
      - department: engineering
        location: nyc-office
  name:
    description: >-
      Organization name. This field stores the formal organization name used for
      identification and display purposes.
    type: string
    examples:
      - AcmeCorp
  organization_id:
    description: Unique identifier for the organization. Immutable and read-only.
    type: string
    examples:
      - org_1234abcd5678efgh
  permissions:
    description: >-
      Effective permissions granted to the user within the organization
      (including inherited permissions from assigned roles). Lists the specific
      actions and access rights the user can perform.
    type: array
    items:
      type: string
    examples:
      - - read_projects
        - write_tasks
        - manage_users
  provisioning_method:
    description: |-
      How the user was provisioned. 
      Possible values: 
      - `jit_using_sso` (Just-in-time provisioning during SSO login)
      - `allowed_email_domain` (User joined via allowed email domain matching)
      - `org_creator` (User created the organization)
      - `direct_provision` (User was directly provisioned via API or SCIM)
      - `invitation` (User was invited and accepted an invitation)
    type: string
  roles:
    type: array
    items:
      type: object
      $ref: ./commonsRole.yaml
