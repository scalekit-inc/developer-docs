type: object
properties:
  email:
    description: Email
    type: string
    examples:
      - johndoe
  emails:
    description: Emails
    type: array
    items:
      type: string
  family_name:
    description: Last Name
    type: string
    examples:
      - Doe
  given_name:
    description: First Name
    type: string
    examples:
      - John
  groups:
    description: Groups
    type: array
    items:
      type: object
      $ref: ./directoriesDirectoryGroup.yaml
  id:
    description: User ID
    type: string
    examples:
      - diruser_121312434123312
  preferred_username:
    description: Preferred Username
    type: string
    examples:
      - johndoe
  updated_at:
    description: Updated At
    type: string
    format: date-time
    examples:
      - '2024-10-01T00:00:00Z'
  user_detail:
    description: Complete User Details Payload
    type: object
