type: object
properties:
  custom_attributes:
    description: >-
      Updates custom attributes for extended user profile data and
      application-specific information. Use this field to store
      business-specific user data like department, job title, security
      clearances, project assignments, or any other organizational attributes
      your application requires. Unlike system metadata, these attributes are
      typically managed by administrators or applications and are visible to end
      users. Keys must be 3-25 characters, values must be 1-256 characters, with
      a maximum of 20 key-value pairs.
    type: object
    additionalProperties:
      type: string
    examples:
      - department: engineering
        security_clearance: level2
  family_name:
    description: >-
      Updates the user's family name (last name or surname). Use this field to
      modify how the user's last name appears throughout the system. Maximum 255
      characters allowed.
    type: string
    examples:
      - Doe
  first_name:
    description: >-
      [DEPRECATED] Use given_name instead. User's given name. Maximum 200
      characters.
    type: string
    examples:
      - John
  gender:
    description: >-
      Updates the user's gender identity information. Use this field to store
      the user's gender identity for personalization, compliance, or reporting
      purposes. This field supports any string value to accommodate diverse
      gender identities and should be handled with appropriate privacy
      considerations according to your organization's policies.
    type: string
    examples:
      - male
  given_name:
    description: >-
      Updates the user's given name (first name). Use this field to modify how
      the user's first name appears in the system and user interfaces. Maximum
      255 characters allowed.
    type: string
    examples:
      - John
  groups:
    description: >-
      Updates the list of group names the user belongs to within the
      organization. Use this field to manage the user's group memberships for
      role-based access control, team assignments, or organizational structure.
      Groups are typically used for permission management and collaborative
      access. Each group name must be unique within the list, 1-250 characters
      long, with a maximum of 50 groups per user.
    type: array
    items:
      type: string
    examples:
      - - engineering
        - managers
  last_name:
    description: >-
      [DEPRECATED] Use family_name instead. User's family name. Maximum 200
      characters.
    type: string
    examples:
      - Doe
  locale:
    description: >-
      Updates the user's preferred language and region settings using BCP-47
      format codes. Use this field to customize the user's experience with
      localized content, date formats, number formatting, and UI language. When
      not specified, the user inherits the organization's default locale
      settings. Common values include `en-US`, `en-GB`, `fr-FR`, `de-DE`, and
      `es-ES`.
    type: string
    examples:
      - en-US
  metadata:
    description: >-
      Updates system-managed key-value pairs for internal tracking and
      operational data. Use this field to store system-generated metadata like
      account status, signup source, last activity tracking, or
      integration-specific identifiers. These fields are typically managed by
      automated processes rather than direct user input. Keys must be 3-25
      characters, values must be 1-256 characters, with a maximum of 20
      key-value pairs.
    type: object
    additionalProperties:
      type: string
    examples:
      - account_status: active
        signup_source: mobile_app
  name:
    description: >-
      Updates the user's complete display name. Use this field when you want to
      set the full name as a single string rather than using separate given and
      family names. This name appears in user interfaces, reports, and anywhere
      a formatted display name is needed.
    type: string
    examples:
      - John Doe
  phone_number:
    description: >-
      Updates the user's phone number in E.164 international format. Use this
      field to enable SMS-based authentication methods, two-factor
      authentication, or phone-based account recovery. The phone number must
      include the country code and be formatted according to E.164 standards
      (e.g., `+1` for US numbers). This field is required when enabling SMS
      authentication features.
    type: string
    examples:
      - '+14155552671'
  picture:
    description: >-
      Updates the URL to the user's profile picture or avatar image. Use this
      field to set or change the user's profile photo that appears in user
      interfaces, directory listings, and collaborative features. The URL should
      point to a publicly accessible image file. Supported formats typically
      include JPEG, PNG, and GIF. Maximum URL length is 2048 characters.
    type: string
    examples:
      - https://example.com/avatar.jpg
  preferred_username:
    description: >-
      Updates the user's preferred username for display and identification
      purposes. Use this field to set a custom username that the user prefers to
      be known by, which may differ from their email or formal name. This
      username appears in user interfaces, mentions, and informal
      communications. Maximum 512 characters allowed.
    type: string
    examples:
      - John Michael Doe
