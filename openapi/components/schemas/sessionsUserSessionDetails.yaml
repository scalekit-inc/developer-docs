type: object
properties:
  next_page_token:
    description: >-
      Pagination token for retrieving the next page of results. Empty string if
      there are no more pages (you have reached the final page of results).
    type: string
    examples:
      - eyJwYWdlIjogMiwgImxhc3RfaWQiOiAic2VzXzEyMzQ1In0=
  prev_page_token:
    description: >-
      Pagination token for retrieving the previous page of results. Empty string
      for the first page. Use this to navigate backward through result pages.
    type: string
    examples:
      - eyJwYWdlIjogMCwgImZpcnN0X2lkIjogInNlc183OTAxIn0=
  sessions:
    description: >-
      Array of session objects for the requested user. May contain fewer entries
      than the requested page_size when reaching the final page of results.
    type: array
    items:
      type: object
      $ref: ./sessionsSessionDetails.yaml
  total_size:
    description: >-
      Total number of sessions matching the applied filter criteria, regardless
      of pagination. This represents the complete result set size before
      pagination is applied.
    type: integer
    format: int64
    examples:
      - 42
