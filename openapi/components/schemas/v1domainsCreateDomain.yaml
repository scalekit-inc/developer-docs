type: object
properties:
  domain:
    description: >-
      The domain name to be configured. Must be a valid business domain you
      control. Public and disposable domains (gmail.com, outlook.com, etc.) are
      automatically blocked for security.
    type: string
    examples:
      - customerdomain.com
  domain_type:
    description: >
      The domain type.

      - ALLOWED_EMAIL_DOMAIN: trusted domain used to suggest the organization in
      the organization switcher during sign-in/sign-up.

      - ORGANIZATION_DOMAIN: SSO discovery domain used to route users to the
      correct SSO provider and enforce SSO.
    $ref: ./domainsDomainType.yaml
    examples:
      - ORGANIZATION_DOMAIN
