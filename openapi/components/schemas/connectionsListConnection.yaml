type: object
properties:
  domains:
    description: List of domains configured with this connection
    type: array
    items:
      type: string
    examples:
      - - yourapp.com
        - yourworkspace.com
  enabled:
    description: Whether the connection is currently active for organization users
    type: boolean
    examples:
      - false
  id:
    description: Unique identifier of the connection
    type: string
    examples:
      - conn_2123312131125533
  key_id:
    description: >-
      Alternative identifier for this connection, typically used in frontend
      applications or URLs
    type: string
    examples:
      - conn_2123312131125533
  organization_id:
    description: Unique identifier of the organization that owns this connection
    type: string
    examples:
      - org_2123312131125533
  organization_name:
    description: Name of the organization of the connection
    type: string
    examples:
      - Your Organization
  provider:
    description: Identity provider type (e.g., OKTA, Google, Azure AD)
    $ref: ./connectionsConnectionProvider.yaml
    examples:
      - CUSTOM
  provider_key:
    description: Key ID of the identity provider service that handles authentication
    type: string
    examples:
      - google
  status:
    description: Current configuration status of the connection
    $ref: ./connectionsConnectionStatus.yaml
    readOnly: true
    examples:
      - IN_PROGRESS
  type:
    description: Authentication protocol used by the connection
    $ref: ./connectionsConnectionType.yaml
    examples:
      - OIDC
