type: object
properties:
  instances:
    description: List of MCP instances
    type: array
    items:
      type: object
      $ref: ./mcpMcpInstance.yaml
  next_page_token:
    description: Pagination token to fetch the next page
    type: string
  prev_page_token:
    description: Pagination token to fetch the previous page
    type: string
  total_size:
    description: Total number of instances matching the filter
    type: integer
    format: int64
