type: object
properties:
  city:
    description: >-
      City name where the session originated based on IP geolocation.
      Approximate location derived from IP address.
    type: string
    examples:
      - San Francisco
  latitude:
    description: >-
      Latitude coordinate of the estimated location. Decimal format (e.g.,
      '37.7749'). Note: Represents IP geolocation center and may not be precise.
    type: string
    examples:
      - '37.7749'
  longitude:
    description: >-
      Longitude coordinate of the estimated location. Decimal format (e.g.,
      '-122.4194'). Note: Represents IP geolocation center and may not be
      precise.
    type: string
    examples:
      - '-122.4194'
  region:
    description: >-
      Geographic region name derived from IP geolocation. Represents the
      country-level location (e.g., 'United States', 'France').
    type: string
    examples:
      - United States
  region_subdivision:
    description: >-
      Regional subdivision code or name (e.g., state abbreviation for US,
      province for Canada). Two-letter ISO format when applicable.
    type: string
    examples:
      - CA
