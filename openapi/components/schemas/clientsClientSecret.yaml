description: >-
  A secure credential used for authenticating an API client. Each client can
  have multiple secrets for key rotation purposes.
type: object
title: Client Secret
properties:
  create_time:
    description: >-
      The timestamp when this secret was created. This field is automatically
      set by the server and cannot be modified.
    type: string
    format: date-time
    examples:
      - '2024-01-05T14:48:00Z'
  created_by:
    description: >-
      The identifier of the user or system that created this secret. This field
      helps track who created the secret for audit and compliance purposes.
    type: string
    examples:
      - user_12345
  expire_time:
    description: >-
      The timestamp when this secret will expire. After this time, the secret
      cannot be used for authentication regardless of its status. If not set,
      the secret does not expire.
    type: string
    format: date-time
    examples:
      - '2025-01-05T14:48:00Z'
  id:
    description: >-
      The unique identifier for this client secret. This ID is used to reference
      the secret in API requests for management operations like updating or
      deleting the secret.
    type: string
    examples:
      - sec_1234abcd5678efgh
  last_used_time:
    description: >-
      The timestamp when this secret was last used for authentication. This
      field helps track secret usage for security monitoring and identifying
      unused secrets that may be candidates for rotation.
    type: string
    format: date-time
    examples:
      - '2024-02-15T10:30:00Z'
  plain_secret:
    description: >-
      The full plaintext secret value. This field is only populated when the
      secret is first created and is never stored by the server. It must be
      securely stored by the client application as it cannot be retrieved again.
    type: string
    examples:
      - sec_1234567890abcdefghijklmnopqrstuvwxyz
  secret_suffix:
    description: >-
      A suffix that helps identify this secret. This is the last few characters
      of the full secret value but is not sufficient for authentication. Helps
      identify which secret is being used in logs and debugging.
    type: string
    examples:
      - xyzw
  status:
    description: >-
      The current status of this secret. A secret must be ACTIVE to be used for
      authentication. INACTIVE secrets cannot be used for authentication but are
      retained for audit purposes.
    $ref: ./clientsClientSecretStatus.yaml
    examples:
      - INACTIVE
  update_time:
    description: >-
      The timestamp when this secret was last updated. This field is
      automatically updated by the server when the secret's status changes or
      other properties are modified.
    type: string
    format: date-time
    examples:
      - '2024-01-10T09:12:00Z'
