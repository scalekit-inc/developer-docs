type: object
properties:
  enabled:
    description: >-
      Specifies the directory's state after the toggle operation. A value of
      `true` indicates that the directory is enabled and actively synchronizing
      users and groups. A value of `false` means the directory is disabled,
      halting synchronization
    type: boolean
    examples:
      - true
  error_message:
    description: >-
      Contains a human-readable error message if the toggle operation
      encountered an issue. If the operation was successful, this field will be
      empty
    type: string
    examples:
      - The directory is already enabled
