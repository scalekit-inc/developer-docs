type: object
properties:
  key:
    description: >-
      The name of the custom claim. Must be between 1 and 128 characters. Use
      descriptive names that clearly indicate the claim's purpose.
    type: string
    examples:
      - environment
  value:
    description: >-
      The value of the custom claim. This value will be included in access
      tokens issued to the client.
    type: string
    examples:
      - production
