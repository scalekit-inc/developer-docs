type: object
properties:
  expire_time:
    description: Expiry time of the link. The link is valid for 1 minute.
    type: string
    format: date-time
    examples:
      - '2024-02-06T14:48:00Z'
  id:
    description: Unique Identifier for the link
    type: string
    examples:
      - lnk_123123123123123
  location:
    description: >-
      Location of the link. This is the URL that can be used to access the Admin
      portal. The link is valid for 1 minute
    type: string
    examples:
      - https://scalekit.com/portal/lnk_123123123123123
