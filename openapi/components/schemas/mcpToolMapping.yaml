type: object
properties:
  connection_name:
    description: Connection name for the tool
    type: string
    examples:
      - MY-GMAIL
  status:
    description: Authentication status of the tool
    type: string
    readOnly: true
    examples:
      - ACTIVE
  tool_names:
    description: List of tool names
    type: array
    items:
      type: string
    examples:
      - - GMAIL_FETCH_MAILS
        - LIST_DRAFTS
