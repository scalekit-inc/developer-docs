description: Controls the activation state of a specific organization feature
type: object
title: Organization Feature Toggle
required:
  - name
  - enabled
properties:
  enabled:
    description: >-
      Whether the feature is enabled (true) or disabled (false) for this
      organization
    type: boolean
    examples:
      - true
  name:
    description: >-
      Feature identifier. Supported values include: "sso" (Single Sign-On),
      "directory_sync" (Directory Synchronization), "domain_verification"
      (Domain Verification), "session_policy" (Organization-level session policy
      override)
    type: string
    examples:
      - sso
