type: object
properties:
  attribute_mappings:
    description: >-
      Mappings between directory attributes and Scalekit user and group
      attributes
    $ref: ./directoriesAttributeMappings.yaml
  directory_endpoint:
    description: >-
      The endpoint URL generated by Scalekit for synchronizing users and groups
      from the Directory Provider
    type: string
    examples:
      - https://yourapp.scalekit.com/api/v1/directoies/dir_123212312/scim/v2
  directory_provider:
    description: Identity provider connected to this directory
    $ref: ./directoriesDirectoryProvider.yaml
    examples:
      - OKTA
  directory_type:
    description: >-
      Type of the directory, indicating the protocol or standard used for
      synchronization
    $ref: ./directoriesDirectoryType.yaml
    examples:
      - SCIM
  email:
    description: Email Id associated with Directory whose access will be used for polling
    type: string
    examples:
      - john.doe@scalekit.cloud
  enabled:
    description: >-
      Indicates whether the directory is currently enabled and actively
      synchronizing users and groups
    type: boolean
    examples:
      - true
  groups_tracked:
    description: It indicates if all groups are tracked or select groups are tracked
    type: string
    examples:
      - ALL
  id:
    description: Unique identifier of the directory
    type: string
    examples:
      - dir_121312434123312
  last_synced_at:
    description: >-
      Timestamp of the last successful synchronization of users and groups from
      the Directory Provider
    type: string
    format: date-time
    examples:
      - '2024-10-01T00:00:00Z'
  name:
    description: >-
      Name of the directory, typically representing the connected Directory
      provider
    type: string
    examples:
      - Azure AD
  organization_id:
    description: Unique identifier of the organization to which the directory belongs
    type: string
    examples:
      - org_121312434123312
  role_assignments:
    description: >-
      Role assignments associated with the directory, defining group based role
      assignments
    $ref: ./directoriesRoleAssignments.yaml
  secrets:
    description: >-
      List of secrets used for authenticating and synchronizing with the
      Directory Provider
    type: array
    items:
      type: object
      $ref: ./directoriesSecret.yaml
  stats:
    description: >-
      Statistics and metrics related to the directory, such as synchronization
      status and error counts
    $ref: ./directoriesStats.yaml
  status:
    description: Directory Status
    type: string
    examples:
      - IN_PROGRESS
  total_groups:
    description: Total number of groups in the directory
    type: integer
    format: int32
    examples:
      - 10
  total_users:
    description: Total number of users in the directory
    type: integer
    format: int32
    examples:
      - 10
