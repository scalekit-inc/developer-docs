type: object
properties:
  connected_accounts:
    description: >-
      List of connected accounts matching the search query. Excludes sensitive
      authorization details.
    type: array
    items:
      type: object
      $ref: ./connected_accountsConnectedAccountForList.yaml
  next_page_token:
    description: Pagination token for the next page. Empty if this is the last page.
    type: string
    examples:
      - eyJvZmZzZXQiOjMwfQ==
  prev_page_token:
    description: Pagination token for the previous page. Empty if this is the first page.
    type: string
    examples:
      - eyJvZmZzZXQiOjB9
  total_size:
    description: Total count of accounts matching the search query across all pages.
    type: integer
    format: int64
    examples:
      - 100
