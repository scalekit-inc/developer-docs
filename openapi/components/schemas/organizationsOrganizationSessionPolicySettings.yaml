type: object
properties:
  absolute_session_timeout:
    description: >-
      The absolute session timeout value. The unit is specified by
      absolute_session_timeout_unit. Omitted when policy_source is
      'environment'.
    type: integer
    format: int32
    examples:
      - 360
  absolute_session_timeout_unit:
    description: >-
      Unit for absolute_session_timeout. Accepted values: 'minutes', 'hours',
      'days'. Responses always return 'minutes'.
    $ref: ./commonsTimeUnit.yaml
    examples:
      - minutes
  idle_session_timeout:
    description: >-
      The idle session timeout value. The unit is specified by
      idle_session_timeout_unit. Omitted when idle_session_timeout_enabled is
      false or policy_source is 'environment'.
    type: integer
    format: int32
    examples:
      - 84
  idle_session_timeout_enabled:
    description: >-
      Whether idle session timeout is enabled for this organization. Omitted
      when policy_source is 'environment'.
    type: boolean
    examples:
      - true
  idle_session_timeout_unit:
    description: >-
      Unit for idle_session_timeout. Accepted values: 'minutes', 'hours',
      'days'. Responses always return 'minutes'.
    $ref: ./commonsTimeUnit.yaml
    examples:
      - minutes
  policy_source:
    description: >-
      Policy source. 'APPLICATION' means the organization inherits the
      application-level session policy. 'CUSTOM' means organization-specific
      timeout values are active.
    $ref: ./organizationsSessionPolicyType.yaml
    examples:
      - CUSTOM
