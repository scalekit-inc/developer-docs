type: object
properties:
  inviter_email:
    description: >-
      Email address of the user who invited this member. Must be a valid email
      address.
    type: string
    examples:
      - john.doe@example.com
  metadata:
    description: >-
      Custom key-value pairs for storing additional user context. Keys (3-25
      chars), values (1-256 chars).
    type: object
    additionalProperties:
      type: string
    examples:
      - department: engineering
        location: nyc-office
  roles:
    description: Role to assign to the user within the organization
    type: array
    items:
      type: object
      $ref: ./commonsRole.yaml
    examples:
      - - name: admin
