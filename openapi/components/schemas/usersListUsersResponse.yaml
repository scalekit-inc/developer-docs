type: object
properties:
  next_page_token:
    description: >-
      Token for retrieving the next page of results. Empty if there are no more
      pages.
    type: string
    examples:
      - eyJwYWdlIjogMiwgImxhc3RfaWQiOiAidXNyXzEyMzQ1In0=
  prev_page_token:
    description: >-
      Token for retrieving the previous page of results. Empty if this is the
      first page.
    type: string
    examples:
      - eyJwYWdlIjogMCwgImZpcnN0X2lkIjogInVzcl85ODc2NSJ9
  total_size:
    description: >-
      Total number of users matching the request criteria, regardless of
      pagination.
    type: integer
    format: int64
    examples:
      - 1042
  users:
    description: List of users.
    type: array
    items:
      type: object
      $ref: ./usersUser.yaml
