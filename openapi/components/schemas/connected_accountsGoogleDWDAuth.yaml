description: >-
  Google Domain-Wide Delegation authentication — used for GOOGLE_DWD
  connections.

  Send only subject in requests; access_token, scopes, and token_expires_at are
  response-only.
type: object
properties:
  access_token:
    description: >-
      OAuth access token acquired via the jwt-bearer grant. Present in responses
      only.
    type: string
    readOnly: true
    examples:
      - ya29.a0AfH6SMBx...
  scopes:
    description: OAuth scopes granted to this token. Present in responses only.
    type: array
    items:
      type: string
    readOnly: true
    examples:
      - - openid
        - https://www.googleapis.com/auth/userinfo.email
  subject:
    description: >-
      Email address of the Google Workspace user to impersonate via Domain-Wide
      Delegation.
    type: string
    examples:
      - user@example.com
  token_expires_at:
    description: When the access token expires. Present in responses only.
    type: string
    format: date-time
    readOnly: true
