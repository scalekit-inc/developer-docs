type: object
title: Payload for updating an existing connected account - all fields optional
properties:
  api_config:
    description: >-
      Updated JSON configuration for API-specific settings. Merges with existing
      configuration - only provided fields are modified.
    type: object
    examples:
      - rate_limit: 2000
        timeout: 60
  authorization_details:
    description: >-
      Updated authentication credentials. Provide new OAuth tokens (e.g., after
      refresh) or updated static auth details. Only included fields will be
      modified.
    $ref: ./connected_accountsAuthorizationDetails.yaml
    examples:
      - oauth_token:
          access_token: ya29.new_token...
          refresh_token: 1//0g...
          scopes:
            - email
            - profile
            - calendar
