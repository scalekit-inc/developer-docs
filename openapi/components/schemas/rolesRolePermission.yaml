type: object
title: RolePermissions represents a permission with role source information
properties:
  create_time:
    type: string
    format: date-time
  description:
    type: string
  id:
    type: string
  name:
    type: string
  role_name:
    description: Name of the role from which this permission was sourced
    type: string
    examples:
      - admin_role
  update_time:
    type: string
    format: date-time
