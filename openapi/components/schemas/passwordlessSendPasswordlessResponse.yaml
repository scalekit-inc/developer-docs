type: object
properties:
  auth_request_id:
    description: >-
      Unique identifier for this passwordless authentication request. Use this
      ID to resend emails.
    type: string
    readOnly: true
    examples:
      - h5Y8kT5RVwaea5WEgW4n-6C-aO_-fuTUW7Vb9-Rh3AcY9qxZqQ
  expires_at:
    description: >-
      Unix timestamp (seconds since epoch) when the passwordless authentication
      will expire. After this time, the OTP or magic link will no longer be
      valid.
    type: string
    format: int64
    readOnly: true
    examples:
      - 1748696575
  expires_in:
    description: >-
      Number of seconds from now until the passwordless authentication expires.
      This is a convenience field calculated from the expires_at timestamp.
    type: integer
    format: int64
    readOnly: true
    examples:
      - 300
  passwordless_type:
    description: >-
      Type of passwordless authentication that was sent via email. OTP sends a
      numeric code, LINK sends a clickable magic link, and LINK_OTP provides
      both options for user convenience.
    $ref: ./authpasswordlessPasswordlessType.yaml
    examples:
      - OTP
