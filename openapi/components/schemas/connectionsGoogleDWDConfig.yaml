type: object
properties:
  scopes:
    description: OAuth 2.0 scopes to request.
    type: array
    items:
      type: string
  service_account_json:
    description: >-
      Google Cloud service account JSON key. Write-only: reads return a masked
      value.
    type: string
  token_uri:
    description: Google token endpoint. Defaults to https://oauth2.googleapis.com/token.
    type: string
