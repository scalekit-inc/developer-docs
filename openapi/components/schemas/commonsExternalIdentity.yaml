type: object
properties:
  connection_id:
    description: >-
      Unique identifier for the external identity connection. Immutable and
      read-only.
    type: string
    readOnly: true
    examples:
      - conn_1234abcd5678efgh
  connection_provider:
    description: Type of the identity provider.
    $ref: ./commonsIdentityProviderType.yaml
    readOnly: true
    examples:
      - GOOGLE
  connection_type:
    description: Name of the external identity connection.
    type: string
    readOnly: true
    examples:
      - OAUTH
  connection_user_id:
    description: >-
      Unique identifier for the user in the external identity provider system.
      Immutable and read-only.
    type: string
    readOnly: true
    examples:
      - ext_user_12345
  created_time:
    description: >-
      Timestamp when this external identity connection was first created.
      Immutable and read-only.
    type: string
    format: date-time
    readOnly: true
  is_social:
    description: >-
      Indicates if the identity provider is a social provider (true) or
      enterprise/custom provider (false). Read-only.
    type: boolean
    readOnly: true
    examples:
      - true
  last_login_time:
    description: >-
      Timestamp of the user's last successful login via this external identity
      provider. Automatically updated by the system.
    type: string
    format: date-time
    readOnly: true
  last_synced_time:
    description: >-
      Timestamp of the last data synchronization for this external identity from
      the provider. Automatically updated by the system.
    type: string
    format: date-time
    readOnly: true
