type: object
properties:
  audience:
    description: >-
      The intended recipients of access tokens issued to this client. Each
      audience value should be a URI that identifies an API or service.
    type: array
    items:
      type: string
    examples:
      - - https://api.example.com
  client_id:
    description: >-
      The unique identifier for this API client. This ID is used to identify the
      client in API requests and logs. It is automatically generated when the
      client is created and cannot be modified.
    type: string
    examples:
      - m2morg_1231234233424344
  create_time:
    description: >-
      The timestamp when this API client was created. This field is
      automatically set by the server and cannot be modified.
    type: string
    format: date-time
    examples:
      - '2024-01-05T14:48:00Z'
  custom_claims:
    description: >-
      Additional claims included in access tokens issued to this client. These
      claims provide context about the client and can be used for authorization
      decisions.
    type: array
    items:
      type: object
      $ref: ./clientsCustomClaim.yaml
  description:
    description: >-
      A detailed description of the client's purpose and usage. This helps
      administrators understand what the client is used for.
    type: string
    examples:
      - Service account for automated deployment processes
  expiry:
    description: Expiry time in seconds for the token generated by the client
    type: string
    format: int64
    examples:
      - 3600
  is_cimd:
    description: >-
      Indicates if the client was created via Client ID Metadata Document
      (CIMD). CIMD clients can update their own configuration according to the
      CIMD specification.
    type: boolean
    examples:
      - false
  is_dcr:
    description: >-
      Indicates if the client was created via Dynamic Client Registration (DCR).
      Clients created through DCR may have different management and lifecycle
      policies compared to those created manually.
    type: boolean
    examples:
      - false
  metadata_uri:
    description: >-
      The URI to the client's metadata, which is utilized to obtain the client's
      configuration details
    type: string
    examples:
      - https://example.com/client-metadata.json
  name:
    description: >-
      The display name of the API client. This name helps identify the client in
      the dashboard and logs.
    type: string
    examples:
      - GitHub Actions Deployment Service
  organization_id:
    description: >-
      The ID of the organization that owns this API client. This ID is used to
      associate the client with the correct organization and enforce
      organization-specific access controls.
    type: string
    examples:
      - org_1231234233424344
  redirect_uris:
    description: >-
      The redirect URI for this API client. This URI is used in the OAuth 2.0
      authorization flow to redirect users after authentication.
    type: array
    items:
      type: string
    examples:
      - - https://example.com/callback
  resource_id:
    description: >-
      The ID of the resource associated with this M2M client. This field is used
      to link the client to a specific resource in the system.
    type: string
    examples:
      - app_1231234233424344
  scopes:
    description: >-
      The OAuth 2.0 scopes granted to this client. These scopes determine what
      resources and actions the client can access.
    type: array
    items:
      type: string
    examples:
      - - deploy:resources
        - read:deployments
  secrets:
    description: >-
      List of client secrets associated with this client. Each secret can be
      used for authentication, but only the most recently created secret is
      typically active. Secrets are stored securely and their values are never
      returned after creation.
    type: array
    items:
      type: object
      $ref: ./clientsClientSecret.yaml
  update_time:
    description: >-
      The timestamp when this API client was last updated. This field is
      automatically updated by the server whenever the client's configuration
      changes.
    type: string
    format: date-time
    examples:
      - '2024-01-05T14:48:00Z'
