type: object
title: >-
  Payload for creating a new connected account - authorization details are
  optional
properties:
  api_config:
    description: >-
      Optional JSON configuration for connector-specific API settings such as
      rate limits, custom API endpoints, timeouts, or feature flags.
    type: object
    examples:
      - base_url: https://api.custom-domain.com
        rate_limit: 1000
        timeout: 30
  authorization_details:
    description: >-
      Optional authentication credentials for the connected account. Include
      OAuth tokens (access_token, refresh_token, scopes) or static auth details
      (API keys, bearer tokens). Can be provided later via update.
    $ref: ./connected_accountsAuthorizationDetails.yaml
    examples:
      - oauth_token:
          access_token: ya29.a0...
          refresh_token: 1//0g...
          scopes:
            - email
            - profile
