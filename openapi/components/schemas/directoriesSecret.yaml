type: object
properties:
  create_time:
    description: Creation Time
    type: string
    format: date-time
    examples:
      - '2024-10-01T00:00:00Z'
  directory_id:
    description: Directory ID
    type: string
    examples:
      - dir_12362474900684814
  expire_time:
    description: Expiry Time
    type: string
    format: date-time
    examples:
      - '2025-10-01T00:00:00Z'
  id:
    type: string
  last_used_time:
    description: Last Used Time
    type: string
    format: date-time
    examples:
      - '2024-10-01T00:00:00Z'
  secret_suffix:
    description: Secret Suffix
    type: string
    examples:
      - Nzg5
  status:
    description: Secret Status
    $ref: ./directoriesSecretStatus.yaml
    examples:
      - INACTIVE
