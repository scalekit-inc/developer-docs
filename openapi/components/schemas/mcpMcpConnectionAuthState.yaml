type: object
properties:
  authentication_link:
    description: >-
      Fresh authentication link for the connected account. Empty when
      include_auth_link is false or when the connection has no associated key.
    type: string
  connected_account_id:
    description: ID of the connected account for this user and connection
    type: string
  connected_account_status:
    description: Authentication status of the connected account
    type: string
  connection_id:
    description: ID of the connection
    type: string
  connection_name:
    description: Name of the connection
    type: string
  provider:
    description: Provider identifier for the connection
    type: string
