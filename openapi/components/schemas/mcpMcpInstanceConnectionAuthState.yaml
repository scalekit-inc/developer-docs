type: object
properties:
  authentication_link:
    description: Magic link for reconnecting the connected account
    type: string
  connected_account_id:
    description: Connected account backing the connection
    type: string
  connected_account_status:
    description: Current authentication status of the connected account
    type: string
  connection_id:
    description: Underlying connection identifier
    type: string
  connection_name:
    description: Developer-assigned connection name
    type: string
  provider:
    description: Provider backing the connection
    type: string
