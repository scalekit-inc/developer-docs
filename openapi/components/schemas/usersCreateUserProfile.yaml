type: object
properties:
  custom_attributes:
    description: >-
      Custom attributes for extended user profile data. Keys (3-25 chars),
      values (1-256 chars).
    type: object
    additionalProperties:
      type: string
    examples:
      - department: engineering
        security_clearance: level2
  family_name:
    description: User's family name. Maximum 255 characters.
    type: string
    examples:
      - Doe
  gender:
    description: User's gender identity.
    type: string
    examples:
      - male
  given_name:
    description: User's given name. Maximum 255 characters.
    type: string
    examples:
      - John
  groups:
    description: >-
      List of group names the user belongs to. Each group name must be 1-250
      characters
    type: array
    items:
      type: string
    examples:
      - - engineering
        - managers
  locale:
    description: >-
      User's localization preference in BCP-47 format. Defaults to organization
      settings.
    type: string
    examples:
      - en-US
  metadata:
    description: >-
      System-managed key-value pairs for internal tracking. Keys (3-25 chars),
      values (1-256 chars).
    type: object
    additionalProperties:
      type: string
    examples:
      - account_status: active
        signup_source: mobile_app
  name:
    description: Full name in display format. Typically combines first_name and last_name.
    type: string
    examples:
      - John Michael Doe
  phone_number:
    description: >-
      Phone number in E.164 international format. Required for SMS-based
      authentication.
    type: string
    examples:
      - '+14155552671'
  picture:
    description: URL to the user's profile picture or avatar.
    type: string
    examples:
      - https://example.com/avatar.jpg
  preferred_username:
    description: User's preferred username for display purposes.
    type: string
    examples:
      - John Michael Doe
