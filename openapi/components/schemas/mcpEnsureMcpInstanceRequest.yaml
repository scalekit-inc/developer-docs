type: object
properties:
  config_name:
    description: Name of the MCP configuration to associate with the instance
    type: string
    examples:
      - daily-summarizer
  name:
    description: Display name for the MCP instance
    type: string
    examples:
      - daily-digest
  user_identifier:
    description: Identifier for the end user requesting the instance
    type: string
    examples:
      - akshay.parihar
