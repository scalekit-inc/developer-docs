type: object
properties:
  attribute_mapping:
    description: >-
      Maps identity provider attributes to user profile fields. For example,
      {'email': 'user.mail', 'name': 'user.displayName'}.
    type: object
    additionalProperties:
      type: string
  configuration_type:
    description: >-
      How the connection was configured: DISCOVERY (automatic configuration) or
      MANUAL (administrator configured)
    $ref: ./connectionsConfigurationType.yaml
    examples:
      - MANUAL
  debug_enabled:
    description: >-
      Enables testing mode that allows non-HTTPS endpoints. Should only be
      enabled in development environments, never in production.
    type: boolean
    examples:
      - true
  domains:
    description: >-
      Domain associated with this connection, used for domain-based
      authentication flows.
    type: array
    items:
      type: object
      $ref: ./domainsDomain.yaml
    examples:
      - - name: example.com
  enabled:
    description: >-
      Controls whether users can sign in using this connection. When false, the
      connection exists but cannot be used for authentication.
    type: boolean
    examples:
      - false
  google_dwd_config:
    description: >-
      Configuration details for Google Domain-Wide Delegation. Present only when
      type is GOOGLE_DWD.
    $ref: ./connectionsGoogleDWDConfig.yaml
  id:
    description: >-
      Unique identifier for this connection. Used in API calls to reference this
      specific connection.
    type: string
    examples:
      - conn_2123312131125533
  key_id:
    description: >-
      Alternative identifier for this connection, typically used in frontend
      applications or URLs.
    type: string
  oauth_config:
    description: >-
      Configuration details for OAuth connections. Present only when type is
      OAUTH.
    $ref: ./connectionsOAuthConnectionConfig.yaml
  oidc_config:
    description: >-
      Configuration details for OpenID Connect (OIDC) connections. Present only
      when type is OIDC.
    $ref: ./connectionsOIDCConnectionConfig.yaml
  organization_id:
    description: >-
      Identifier of the organization that owns this connection. Connections are
      typically scoped to a single organization.
    type: string
    examples:
      - org_2123312131125533
  passwordless_config:
    description: >-
      Configuration details for Magic Link authentication. Present only when
      type is MAGIC_LINK.
    $ref: ./connectionsPasswordLessConfig.yaml
  provider:
    description: >-
      Identity provider service that handles authentication (such as OKTA,
      Google, Azure AD, or a custom provider)
    $ref: ./connectionsConnectionProvider.yaml
    examples:
      - OKTA
  provider_key:
    description: Key ID of the identity provider service that handles authentication
    type: string
    examples:
      - google
  saml_config:
    description: >-
      Configuration details for SAML connections. Present only when type is
      SAML.
    $ref: ./connectionsSAMLConnectionConfigResponse.yaml
  static_config:
    description: >-
      Static configuration for custom connections. Present only when type is
      BASIC, BEARER, API_KEY, or custom.
    $ref: ./connectionsStaticAuthConfig.yaml
  status:
    description: >-
      Current configuration status of the connection. Possible values include
      IN_PROGRESS, CONFIGURED, and ERROR.
    $ref: ./connectionsConnectionStatus.yaml
    readOnly: true
    examples:
      - IN_PROGRESS
  test_connection_uri:
    description: >-
      URI that can be used to test this connection. Visit this URL to verify the
      connection works correctly.
    type: string
    examples:
      - https://auth.example.com/test-connection/conn_2123312131125533
  type:
    description: >-
      Authentication protocol used by this connection. Can be OIDC (OpenID
      Connect), SAML, OAUTH, or MAGIC_LINK.
    $ref: ./connectionsConnectionType.yaml
    examples:
      - OIDC
  webauthn_config:
    description: >-
      Configuration details for WebAuthn (passkeys). Present only when type is
      WEBAUTHN.
    $ref: ./connectionsWebAuthConfiguration.yaml
