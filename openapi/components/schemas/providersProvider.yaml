type: object
title: Provider represents a connected app provider
properties:
  auth_patterns:
    type: array
    items:
      type: object
  categories:
    type: array
    items:
      type: string
  coming_soon:
    type: boolean
  description:
    type: string
  display_name:
    type: string
  display_priority:
    type: integer
    format: int32
  icon_src:
    type: string
  id:
    type: string
  identifier:
    type: string
  is_custom:
    description: Indicates whether the provider is environment-scoped (custom provider)
    type: boolean
    examples:
      - false
  is_custom_mcp:
    description: Indicates whether this is an environment-scoped MCP-based custom provider
    type: boolean
    examples:
      - false
  metadata:
    description: >-
      Custom key-value metadata stored for this provider. Returned for all
      providers; defaults to {} when no metadata has been set.
    type: object
    additionalProperties:
      type: string
    examples:
      - api_version: v2
        region: us-east-1
  proxy_enabled:
    type: boolean
  proxy_url:
    type: string
