type: object
properties:
  connected_accounts:
    description: >-
      List of connected accounts matching the filter criteria. Excludes
      sensitive authorization details for security.
    type: array
    items:
      type: object
      $ref: ./connected_accountsConnectedAccountForList.yaml
  next_page_token:
    description: >-
      Pagination token for retrieving the next page. Empty if this is the last
      page. Pass this value to page_token in the next request.
    type: string
    examples:
      - eyJvZmZzZXQiOjIwfQ==
  prev_page_token:
    description: >-
      Pagination token for retrieving the previous page. Empty if this is the
      first page. Pass this value to page_token to go back.
    type: string
    examples:
      - eyJvZmZzZXQiOjB9
  total_size:
    description: >-
      Total count of connected accounts matching the filter criteria across all
      pages. Use for calculating pagination.
    type: integer
    format: int64
    examples:
      - 100
