type: object
properties:
  next_page_token:
    description: Token to retrieve next page of results
    type: string
    examples:
      - token_def456
  permissions:
    type: array
    items:
      type: object
      $ref: ./rolesPermission.yaml
  prev_page_token:
    description: Token to retrieve previous page of results
    type: string
    examples:
      - token_def456
  total_size:
    description: Total number of permissions available
    type: integer
    format: int64
    examples:
      - 150
