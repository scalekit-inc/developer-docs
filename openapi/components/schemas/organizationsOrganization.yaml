type: object
required:
  - create_time
properties:
  create_time:
    description: Timestamp when the organization was created
    type: string
    format: date-time
    title: Created Time
    examples:
      - '2025-02-15T06:23:44.560000Z'
  display_name:
    description: Name of the organization. Must be between 1 and 200 characters
    type: string
    title: Name of the org to be used in display
    examples:
      - Megasoft
  external_id:
    description: >-
      Your application's unique identifier for this organization, used to link
      Scalekit with your system.
    type: string
    title: >-
      External Id is useful to store a unique identifier for a given Org that.
      The unique Identifier can be the id of your tenant / org in your SaaSApp
    examples:
      - my_unique_id
  id:
    description: >-
      Unique scalekit-generated identifier that uniquely references an
      organization
    type: string
    title: Id
    examples:
      - org_59615193906282635
  logo_url:
    description: >-
      HTTPS URL of the organization's logo image. Maximum 2048 characters. Must
      use the https scheme.
    type: string
    format: uri
    maxLength: 2048
    pattern: ^https://
    examples:
      - https://cdn.example.com/acme-logo.png
  metadata:
    description: Key value pairs extension attributes.
    type: object
    additionalProperties:
      type: string
  region_code:
    description: Geographic region code for the organization. Currently limited to US.
    title: Optional regioncode
    $ref: ./commonsRegionCode.yaml
    examples:
      - US
  settings:
    title: Organization Settings
    $ref: ./organizationsOrganizationSettings.yaml
  slug:
    description: >-
      DNS-safe slug for dynamic redirect URI resolution. Must be 1-63 chars,
      lowercase alphanumeric and hyphens, must start and end with an
      alphanumeric character. Unique per environment.
    type: string
    maxLength: 63
    minLength: 1
    pattern: ^[a-z0-9]([a-z0-9]|-[a-z0-9])*$
    examples:
      - acme
  update_time:
    description: Timestamp when the organization was last updated
    type: string
    format: date-time
    title: Updated time
    examples:
      - '2025-02-15T06:23:44.560000Z'
