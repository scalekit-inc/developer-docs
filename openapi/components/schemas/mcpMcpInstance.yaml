type: object
properties:
  config:
    description: Configuration backing this instance
    $ref: ./mcpMcpConfig.yaml
  id:
    description: Unique ID of the MCP instance
    type: string
    readOnly: true
    examples:
      - inst_88630864544790977
  last_used_at:
    description: Timestamp when the instance was last used
    type: string
    format: date-time
    examples:
      - '0001-01-01T00:00:00Z'
  name:
    description: Display name of the instance
    type: string
    examples:
      - daily-digest
  updated_at:
    description: Timestamp when the instance was last updated
    type: string
    format: date-time
    examples:
      - '2025-10-07T12:21:00Z'
  url:
    description: URL to reach the MCP instance
    type: string
    examples:
      - https://example.com/mcp/v1/abc123
  user_identifier:
    description: Identifier for the user who owns or uses this instance
    type: string
    examples:
      - akshay.parihar
