type: object
properties:
  default_creator:
    description: Default creator role (deprecated - use default_creator_role field instead)
    $ref: ./rolesUpdateDefaultRole.yaml
    examples:
      - description: Role for creating resources
        display_name: Creator Role
        id: role_1234567890
        name: creator
  default_creator_role:
    description: >-
      Name of the role to set as the default creator role. This role will be
      automatically assigned to users who create new resources in the
      environment. Must be a valid role name that exists in the environment.
    type: string
    examples:
      - creator
  default_member:
    description: Default member role (deprecated - use default_member_role field instead)
    $ref: ./rolesUpdateDefaultRole.yaml
    examples:
      - description: Role for regular members
        display_name: Member Role
        id: role_0987654321
        name: member
  default_member_role:
    description: >-
      Name of the role to set as the default member role. This role will be
      automatically assigned to new users when they join the environment. Must
      be a valid role name that exists in the environment.
    type: string
    examples:
      - member
