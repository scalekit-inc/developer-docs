type: object
properties:
  aaguid:
    description: Authenticator Attestation GUID (AAGUID) identifying the device model
    type: string
  attachment:
    description: 'Attachment type: "platform" (built-in) or "cross-platform"'
    type: string
    examples:
      - platform
  icon_dark:
    description: Icon URL for dark theme display
    type: string
  icon_light:
    description: Icon URL for light theme display
    type: string
  name:
    description: Human-readable name of the authenticator model
    type: string
    examples:
      - Apple Touch ID
