type: object
properties:
  create_time:
    description: Timestamp when the domain was first created.
    type: string
    format: date-time
    examples:
      - '2025-09-01T12:14:43.100000Z'
  domain:
    description: >-
      The business domain name that was configured for allowed email domain
      functionality (e.g., company.com, subdomain.company.com).
    type: string
    examples:
      - customerdomain.com
  domain_type:
    example: ORGANIZATION_DOMAIN
  environment_id:
    description: The environment ID where this domain is configured.
    type: string
    examples:
      - env_58345499215790610
  id:
    description: Scalekit-generated unique identifier for this domain record.
    type: string
    examples:
      - dom_88351643129225005
  organization_id:
    description: The organization to which the domain belongs.
    type: string
    examples:
      - org_81667076086825451
  update_time:
    description: Timestamp when the domain was last updated.
    type: string
    format: date-time
    examples:
      - '2025-09-01T12:14:43.110455Z'
  verification_method:
    description: >-
      Method that determines how domain ownership is verified.

      - ADMIN: domain is marked verified without DNS validation, typically by an
      admin.

      - DNS: domain must be verified by adding a TXT record to your DNS
      configuration.

      - NOT_APPLICABLE: verification does not apply to this domain type.
    $ref: ./domainsVerificationMethod.yaml
    examples:
      - ADMIN
  verification_status:
    description: >-
      Verification status of the domain.

      - PENDING: DNS TXT record has not been validated yet.

      - VERIFIED: domain confirmed via DNS TXT record validation or admin
      approval.

      - AUTO_VERIFIED: domain verified automatically without DNS changes.

      - FAILED: DNS TXT record was not validated within the verification window.
    $ref: ./domainsVerificationStatus.yaml
    examples:
      - AUTO_VERIFIED
