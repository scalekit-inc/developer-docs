type: object
properties:
  connected_account_identifier:
    description: Identifier for the connected account
    type: string
    examples:
      - account_123
  id:
    description: Unique ID of the tool
    type: string
    readOnly: true
    examples:
      - res_123
  tool_mappings:
    description: Provider name (e.g. GOOGLE)
    type: array
    items:
      type: object
      $ref: ./mcpToolMapping.yaml
    examples:
      - GOOGLE
  url:
    description: Unique ID of the tool
    type: string
    readOnly: true
    examples:
      - https://example.com/mcp/v1/abc
