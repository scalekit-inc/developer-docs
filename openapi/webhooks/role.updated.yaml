post:
  summary: Role Updated
  description: Triggered when a role is updated
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ScalekitEvent.yaml
        example:
          spec_version: '1'
          id: evt_2345678901
          type: role.updated
          object: Role
          occurred_at: '2024-01-15T10:35:00.123456789Z'
          environment_id: env_1234567890
          data:
            description: Updated viewer role with limited permissions
            display_name: Viewer
            extends: member
            id: role_1234567890
            name: viewer
          display_name: Role Updated
  responses:
    '200':
      description: Webhook received successfully
