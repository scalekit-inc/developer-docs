post:
  summary: Role Created
  description: Triggered when a new role is created
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ScalekitEvent.yaml
        example:
          spec_version: '1'
          id: evt_1234567890
          type: role.created
          object: Role
          occurred_at: '2024-01-15T10:30:00.123456789Z'
          environment_id: env_1234567890
          data:
            description: Viewer role with read-only access
            display_name: Viewer
            extends: member
            id: role_1234567890
            name: viewer
          display_name: Role Created
  responses:
    '200':
      description: Webhook received successfully
