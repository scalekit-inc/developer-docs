post:
  summary: Permission Updated
  description: Triggered when a permission is updated
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ScalekitEvent.yaml
        example:
          spec_version: '1'
          id: evt_2345678901
          type: permission.updated
          object: Permission
          occurred_at: '2024-01-15T10:35:00.123456789Z'
          environment_id: env_1234567890
          data:
            description: Updated permission to manage all data
            id: perm_1234567890
            name: data:manage
          display_name: Permission Updated
  responses:
    '200':
      description: Webhook received successfully
