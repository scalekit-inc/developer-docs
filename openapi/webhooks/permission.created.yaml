post:
  summary: Permission Created
  description: Triggered when a new permission is created
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ScalekitEvent.yaml
        example:
          spec_version: '1'
          id: evt_1234567890
          type: permission.created
          object: Permission
          occurred_at: '2024-01-15T10:30:00.123456789Z'
          environment_id: env_1234567890
          data:
            description: Permission to manage data
            id: perm_1234567890
            name: data:manage
          display_name: Permission Created
  responses:
    '200':
      description: Webhook received successfully
