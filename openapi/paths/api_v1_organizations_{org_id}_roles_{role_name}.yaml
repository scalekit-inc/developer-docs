get:
  description: >-
    Retrieves complete information for a specific organization role including
    metadata, inheritance details, and optionally permissions. Use this endpoint
    to audit role configuration and understand the role's place in the
    organization's role hierarchy. You can include permission details to see
    what capabilities the role provides. This operation is useful for role
    management, user assignment decisions, or understanding organization access
    controls.
  tags:
    - Roles
  summary: Get organization role details
  operationId: RolesService_GetOrganizationRole
  parameters:
    - schema:
        type: string
      description: Unique identifier of the organization
      name: org_id
      in: path
      required: true
    - schema:
        type: string
      description: Unique name of the role
      name: role_name
      in: path
      required: true
    - schema:
        type: string
      description: >-
        Include additional data in the response. Valid values: 'permissions'
        (direct permissions only), 'permissions:all' (includes inherited
        permissions)
      name: include
      in: query
  responses:
    '200':
      description: >-
        Successfully retrieved organization role details. Returns the role
        object including metadata and inheritance details. Permissions are
        included only when requested via the include parameter.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/rolesGetOrganizationRoleResponse.yaml
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: >-
          ../code_samples/javascript/api_v1_organizations_{org_id}_roles_{role_name}/get.js
    - label: Python SDK
      lang: python
      source:
        $ref: >-
          ../code_samples/python/api_v1_organizations_{org_id}_roles_{role_name}/get.py
    - label: Go SDK
      lang: go
      source:
        $ref: >-
          ../code_samples/go/api_v1_organizations_{org_id}_roles_{role_name}/get.go
    - label: Java SDK
      lang: java
      source:
        $ref: >-
          ../code_samples/java/api_v1_organizations_{org_id}_roles_{role_name}/get.java
put:
  description: >-
    Modifies an existing organization role's properties including display name,
    description, permissions, and inheritance settings. Use this endpoint to
    update role metadata, change permission assignments, or modify role
    hierarchy within the organization. Only the fields you specify will be
    updated, leaving other properties unchanged. When updating permissions, the
    new list replaces all existing permissions for the role.
  tags:
    - Roles
  summary: Update organization role
  operationId: RolesService_UpdateOrganizationRole
  parameters:
    - schema:
        type: string
      description: Unique identifier of the organization
      name: org_id
      in: path
      required: true
    - schema:
        type: string
      description: Unique name of the role
      name: role_name
      in: path
      required: true
  responses:
    '200':
      description: >-
        Organization role updated successfully. Returns the modified role object
        with updated timestamps.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/rolesUpdateOrganizationRoleResponse.yaml
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: >-
          ../code_samples/javascript/api_v1_organizations_{org_id}_roles_{role_name}/put.js
    - label: Python SDK
      lang: python
      source:
        $ref: >-
          ../code_samples/python/api_v1_organizations_{org_id}_roles_{role_name}/put.py
    - label: Go SDK
      lang: go
      source:
        $ref: >-
          ../code_samples/go/api_v1_organizations_{org_id}_roles_{role_name}/put.go
    - label: Java SDK
      lang: java
      source:
        $ref: >-
          ../code_samples/java/api_v1_organizations_{org_id}_roles_{role_name}/put.java
  requestBody:
    content:
      application/json:
        schema:
          description: Organization role details
          $ref: ../components/schemas/v1rolesUpdateRole.yaml
    required: true
delete:
  description: >-
    Permanently removes a role from the organization and optionally reassigns
    users who had that role to a different role. Use this endpoint when you need
    to clean up unused roles or restructure your organization's access control
    system. If users are assigned to the role being deleted, you can provide a
    reassign_role_name to move those users to a different role before deletion.
    This action cannot be undone, so ensure no critical users depend on the role
    before deletion.
  tags:
    - Roles
  summary: Delete organization role
  operationId: RolesService_DeleteOrganizationRole
  parameters:
    - schema:
        type: string
      description: Unique identifier of the organization
      name: org_id
      in: path
      required: true
    - schema:
        type: string
      description: Unique name of the role
      name: role_name
      in: path
      required: true
    - schema:
        type: string
      description: Role name to reassign users to when deleting this role
      name: reassign_role_name
      in: query
  responses:
    '200':
      description: >-
        Organization role successfully deleted and users reassigned if
        specified. No content returned.
      content:
        application/json:
          schema: {}
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: >-
          ../code_samples/javascript/api_v1_organizations_{org_id}_roles_{role_name}/delete.js
    - label: Python SDK
      lang: python
      source:
        $ref: >-
          ../code_samples/python/api_v1_organizations_{org_id}_roles_{role_name}/delete.py
    - label: Go SDK
      lang: go
      source:
        $ref: >-
          ../code_samples/go/api_v1_organizations_{org_id}_roles_{role_name}/delete.go
    - label: Java SDK
      lang: java
      source:
        $ref: >-
          ../code_samples/java/api_v1_organizations_{org_id}_roles_{role_name}/delete.java
