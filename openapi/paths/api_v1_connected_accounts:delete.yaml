post:
  description: >-
    Permanently removes a connected account and revokes all associated
    authentication credentials. Identify the account by ID, or by combination of
    organization/user, connector, and identifier. This action cannot be undone.
    All OAuth tokens and API keys for this account will be invalidated.
  tags:
    - Connected Accounts
  summary: Delete a connected account
  operationId: ConnectedAccountService_DeleteConnectedAccount
  responses:
    '200':
      description: Connected account deleted successfully and all credentials revoked
      content:
        application/json:
          schema: {}
    '400':
      description: Invalid request - malformed parameters or validation failed
      content:
        application/json:
          schema: {}
    '401':
      description: Authentication required - missing or invalid access token
      content:
        application/json:
          schema: {}
    '404':
      description: Connected account not found - the specified account does not exist
      content:
        application/json:
          schema: {}
  requestBody:
    content:
      application/json:
        schema:
          $ref: >-
            ../components/schemas/connected_accountsDeleteConnectedAccountRequest.yaml
    required: true
