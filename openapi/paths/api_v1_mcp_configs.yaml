get:
  description: >-
    Lists MCP configurations for the current environment with optional filters
    for id, name prefix, and provider.
  tags:
    - MCP Configurations
  summary: List MCP configurations
  operationId: McpService_ListMcpConfigs
  parameters:
    - schema:
        type: string
      description: Filter by MCP configuration id
      name: filter.id
      in: query
    - schema:
        type: string
      description: >-
        Case-insensitive prefix search on configuration name (minimum 3
        characters)
      name: filter.name
      in: query
    - schema:
        type: string
      description: Filter configs that include this provider
      name: filter.provider
      in: query
    - schema:
        type: string
      description: Look ahead text search on config name
      name: search
      in: query
    - schema:
        type: integer
        format: int64
      description: Number of configs to return per page (max 30)
      name: page_size
      in: query
    - schema:
        type: string
      description: Pagination token to fetch the next or previous page
      name: page_token
      in: query
  responses:
    '200':
      description: Paginated list of MCP configurations
      content:
        application/json:
          schema:
            $ref: ../components/schemas/mcpListMcpConfigsResponse.yaml
    '400':
      description: Invalid request - bad filter or pagination parameters
      content:
        application/json:
          schema: {}
    '401':
      description: Authentication required
      content:
        application/json:
          schema: {}
post:
  description: Creates a new MCP configuration with a set of connections and tools.
  tags:
    - MCP Configurations
  summary: Create a new MCP configuration
  operationId: McpService_CreateMcpConfig
  responses:
    '201':
      description: The newly created MCP configuration
      content:
        application/json:
          schema:
            $ref: ../components/schemas/mcpCreateMcpConfigResponse.yaml
    '400':
      description: >-
        Invalid request - missing required fields or invalid connection/tool
        mappings
      content:
        application/json:
          schema: {}
    '401':
      description: Authentication required - missing or invalid access token
      content:
        application/json:
          schema: {}
  requestBody:
    content:
      application/json:
        schema:
          description: MCP configuration details to create
          $ref: ../components/schemas/mcpMcpConfig.yaml
    required: true
