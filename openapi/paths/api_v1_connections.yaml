get:
  description: Retrieves a list of connections in the environment
  tags:
    - Connections
  summary: List connections
  operationId: ConnectionService_ListConnections
  parameters:
    - schema:
        type: string
      description: Filter connections by organization identifier
      name: organization_id
      in: query
    - schema:
        type: string
      description: Filter connections by email domain associated with the organization
      name: domain
      in: query
    - schema:
        type: string
      description: >-
        Filter connections by status. Use 'all' to include all connections
        regardless of status. Default behavior shows only active (completed and
        enabled) connections
      name: include
      in: query
  responses:
    '200':
      description: Successfully retrieved connections
      content:
        application/json:
          schema:
            $ref: ../components/schemas/connectionsListConnectionsResponse.yaml
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: ../code_samples/javascript/api_v1_connections/get.js
    - label: Python SDK
      lang: python
      source:
        $ref: ../code_samples/python/api_v1_connections/get.py
    - label: Go SDK
      lang: go
      source:
        $ref: ../code_samples/go/api_v1_connections/get.go
    - label: Java SDK
      lang: java
      source:
        $ref: ../code_samples/java/api_v1_connections/get.java
