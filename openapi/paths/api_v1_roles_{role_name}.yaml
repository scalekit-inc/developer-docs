get:
  description: >-
    Retrieves complete information for a specific role including metadata and
    inheritance details (base role and dependent role count). Use this endpoint
    to audit role configuration and understand the role's place in the
    hierarchy. To view the role's permissions, use the ListRolePermissions
    endpoint.
  tags:
    - Roles
  summary: Get role details
  operationId: RolesService_GetRole
  parameters:
    - schema:
        type: string
      description: >-
        Unique name identifier of the role to retrieve. Must be alphanumeric
        with underscores, 1-64 characters.
      name: role_name
      in: path
      required: true
    - schema:
        type: string
      description: >-
        Include additional data in the response. Valid values: 'permissions'
        (direct permissions only), 'permissions:all' (includes inherited
        permissions from role hierarchy)
      name: include
      in: query
  responses:
    '200':
      description: >-
        Successfully retrieved role details. Returns the role object including
        metadata and inheritance details. Permissions are not included.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/rolesGetRoleResponse.yaml
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: ../code_samples/javascript/api_v1_roles_{role_name}/get.js
    - label: Python SDK
      lang: python
      source:
        $ref: ../code_samples/python/api_v1_roles_{role_name}/get.py
    - label: Go SDK
      lang: go
      source:
        $ref: ../code_samples/go/api_v1_roles_{role_name}/get.go
    - label: Java SDK
      lang: java
      source:
        $ref: ../code_samples/java/api_v1_roles_{role_name}/get.java
put:
  description: >-
    Modifies an existing role's properties including display name, description,
    permissions, and inheritance. Use this endpoint to update role metadata,
    change permission assignments, or modify role hierarchy. Only the fields you
    specify will be updated, leaving other properties unchanged. When updating
    permissions, the new list replaces all existing permissions for the role.
  tags:
    - Roles
  summary: Update role information
  operationId: RolesService_UpdateRole
  parameters:
    - schema:
        type: string
      description: >-
        Unique name identifier of the role to update. Must be alphanumeric with
        underscores, 1-64 characters.
      name: role_name
      in: path
      required: true
  responses:
    '200':
      description: >-
        Role updated successfully. Returns the modified role object with updated
        timestamps.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/rolesUpdateRoleResponse.yaml
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: ../code_samples/javascript/api_v1_roles_{role_name}/put.js
    - label: Python SDK
      lang: python
      source:
        $ref: ../code_samples/python/api_v1_roles_{role_name}/put.py
    - label: Go SDK
      lang: go
      source:
        $ref: ../code_samples/go/api_v1_roles_{role_name}/put.go
    - label: Java SDK
      lang: java
      source:
        $ref: ../code_samples/java/api_v1_roles_{role_name}/put.java
  requestBody:
    content:
      application/json:
        schema:
          description: Role fields to update. Only specified fields will be modified.
          $ref: ../components/schemas/v1rolesUpdateRole.yaml
          examples:
            - description: Can edit and approve content
              display_name: Senior Editor
    required: true
delete:
  description: >-
    Permanently removes a role from the environment and reassigns users who had
    that role to a different role. Use this endpoint when you need to clean up
    unused roles or restructure your access control system. The role cannot be
    deleted if it has dependent roles (roles that extend it) unless you specify
    a replacement role. If users are assigned to the role being deleted, you
    must provide a reassign_role_name to move those users to a different role
    before deletion can proceed. This action cannot be undone, so ensure no
    critical users depend on the role before deletion.
  tags:
    - Roles
  summary: Delete role and reassign users
  operationId: RolesService_DeleteRole
  parameters:
    - schema:
        type: string
      description: >-
        Unique name identifier of the role to delete. Must be alphanumeric with
        underscores, 1-64 characters.
      name: role_name
      in: path
      required: true
    - schema:
        type: string
      description: Role name to reassign users to when deleting this role
      name: reassign_role_id
      in: query
    - schema:
        type: string
      description: Role name to reassign users to when deleting this role
      name: reassign_role_name
      in: query
  responses:
    '200':
      description: Role successfully deleted and users reassigned. No content returned.
      content:
        application/json:
          schema: {}
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: ../code_samples/javascript/api_v1_roles_{role_name}/delete.js
    - label: Python SDK
      lang: python
      source:
        $ref: ../code_samples/python/api_v1_roles_{role_name}/delete.py
    - label: Go SDK
      lang: go
      source:
        $ref: ../code_samples/go/api_v1_roles_{role_name}/delete.go
    - label: Java SDK
      lang: java
      source:
        $ref: ../code_samples/java/api_v1_roles_{role_name}/delete.java
