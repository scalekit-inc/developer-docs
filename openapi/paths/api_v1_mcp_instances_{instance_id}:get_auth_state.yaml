post:
  description: >-
    Returns the connected account status and fresh authentication links for each
    connection mapped to the MCP instance.
  tags:
    - MCP Instances
  summary: Fetch connection auth state for an MCP instance
  operationId: McpService_GetMcpInstanceAuthState
  parameters:
    - schema:
        type: string
      description: ID of the MCP instance whose connection statuses are requested
      name: instance_id
      in: path
      required: true
    - schema:
        type: boolean
      description: Whether to generate fresh authentication links for each connection
      name: include_auth_links
      in: query
  responses:
    '200':
      description: Authentication state for each connection in the MCP instance
      content:
        application/json:
          schema:
            $ref: ../components/schemas/mcpGetMcpInstanceAuthStateResponse.yaml
    '400':
      description: Invalid request
      content:
        application/json:
          schema: {}
    '401':
      description: Authentication required
      content:
        application/json:
          schema: {}
    '404':
      description: Not Found - MCP instance does not exist
      content:
        application/json:
          schema: {}
