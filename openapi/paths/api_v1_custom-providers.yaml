post:
  description: >-
    Creates an environment-scoped custom provider (connector) with
    authentication patterns and optional proxy configuration. The returned
    identifier must be used for all subsequent update and delete operations on
    this provider.
  tags:
    - Connectors
  summary: Create a custom provider
  operationId: ProviderService_CreateCustomProvider
  responses:
    '201':
      description: >-
        Returns the newly created custom provider, including its
        system-generated identifier and configuration
      content:
        application/json:
          schema:
            $ref: ../components/schemas/providersCreateProviderResponse.yaml
    '400':
      description: >-
        Invalid request - the provider payload failed validation (e.g. missing
        required fields or invalid proxy URL)
      content:
        application/json:
          schema: {}
  requestBody:
    content:
      application/json:
        schema:
          description: >-
            Details of the custom connected app provider to create. Identifier
            is derived by the system and the identifier returned in the response
            must be used for update and delete operations.
          $ref: ../components/schemas/v1providersCreateCustomProvider.yaml
    required: true
