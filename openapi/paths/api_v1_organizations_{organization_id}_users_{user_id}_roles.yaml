get:
  description: >-
    Retrieves all roles assigned to a user within a specific organization. This
    includes both direct role assignments and inherited roles from role
    hierarchy.
  tags:
    - Users
  summary: List user roles
  operationId: UserService_ListUserRoles
  parameters:
    - schema:
        type: string
      description: Unique identifier for the organization
      name: organization_id
      in: path
      required: true
    - schema:
        type: string
      description: Unique identifier for the user
      name: user_id
      in: path
      required: true
  responses:
    '200':
      description: Successfully retrieved the list of roles assigned to the user
      content:
        application/json:
          schema:
            $ref: ../components/schemas/usersListUserRolesResponse.yaml
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: >-
          ../code_samples/javascript/api_v1_organizations_{organization_id}_users_{user_id}_roles/get.js
    - label: Python SDK
      lang: python
      source:
        $ref: >-
          ../code_samples/python/api_v1_organizations_{organization_id}_users_{user_id}_roles/get.py
    - label: Go SDK
      lang: go
      source:
        $ref: >-
          ../code_samples/go/api_v1_organizations_{organization_id}_users_{user_id}_roles/get.go
    - label: Java SDK
      lang: java
      source:
        $ref: >-
          ../code_samples/java/api_v1_organizations_{organization_id}_users_{user_id}_roles/get.java
