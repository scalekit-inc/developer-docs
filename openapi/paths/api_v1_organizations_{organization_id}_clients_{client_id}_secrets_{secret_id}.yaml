delete:
  description: >-
    Permanently deletes a secret from an organization API client. This operation
    cannot be undone.
  tags:
    - API Auth
  summary: Delete organization API client secret
  operationId: ClientService_DeleteOrganizationClientSecret
  parameters:
    - schema:
        type: string
      description: Unique identifier of the organization
      name: organization_id
      in: path
      required: true
    - schema:
        type: string
      description: Unique identifier of the API client
      name: client_id
      in: path
      required: true
    - schema:
        type: string
      description: Unique identifier of the client secret
      name: secret_id
      in: path
      required: true
  responses:
    '200':
      description: Client secret successfully deleted and no longer accessible
      content:
        application/json:
          schema: {}
  x-codeSamples:
    - label: Python SDK
      lang: python
      source:
        $ref: >-
          ../code_samples/python/api_v1_organizations_{organization_id}_clients_{client_id}_secrets_{secret_id}/delete.py
