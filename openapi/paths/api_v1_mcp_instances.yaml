get:
  description: >-
    Lists MCP instances for the current environment with optional filters for
    instance id, name, configuration, and text search across name or user
    identifier.
  tags:
    - MCP Instances
  summary: List MCP instances
  operationId: McpService_ListMcpInstances
  parameters:
    - schema:
        type: string
      description: Filter by MCP instance id
      name: filter.id
      in: query
    - schema:
        type: string
      description: Filter by exact instance name
      name: filter.name
      in: query
    - schema:
        type: string
      description: Filter by MCP configuration name
      name: filter.config_name
      in: query
    - schema:
        type: string
      description: Filter by user identifier
      name: filter.user_identifier
      in: query
    - schema:
        type: string
      description: >-
        Case-insensitive look-ahead search across instance name and user
        identifier
      name: search
      in: query
    - schema:
        type: integer
        format: int64
      description: Number of instances to return per page (max 30)
      name: page_size
      in: query
    - schema:
        type: string
      description: Pagination token to fetch the next or previous page
      name: page_token
      in: query
  responses:
    '200':
      description: Paginated list of MCP instances
      content:
        application/json:
          schema:
            $ref: ../components/schemas/mcpListMcpInstancesResponse.yaml
    '400':
      description: Invalid request
      content:
        application/json:
          schema: {}
    '401':
      description: Authentication required
      content:
        application/json:
          schema: {}
post:
  description: >-
    Returns an existing MCP instance for the given configuration, name, and user
    identifier or creates one if none exists.
  tags:
    - MCP Instances
  summary: Get or create an MCP instance
  operationId: McpService_EnsureMcpInstance
  responses:
    '200':
      description: The existing or newly created MCP instance
      content:
        application/json:
          schema:
            $ref: ../components/schemas/mcpEnsureMcpInstanceResponse.yaml
    '400':
      description: Invalid request
      content:
        application/json:
          schema: {}
    '401':
      description: Authentication required
      content:
        application/json:
          schema: {}
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/mcpEnsureMcpInstanceRequest.yaml
    required: true
