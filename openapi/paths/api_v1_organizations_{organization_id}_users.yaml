get:
  description: >-
    Retrieves a paginated list of all users who are members of the specified
    organization. Use this endpoint to view all users with access to a
    particular organization, including their roles, metadata, and membership
    details. Supports pagination for large user lists.
  tags:
    - Users
  summary: List organization users
  operationId: UserService_ListOrganizationUsers
  parameters:
    - schema:
        type: string
      description: >-
        Unique identifier of the organization for which to list users. Must
        start with 'org_' and be 1-32 characters long.
      name: organization_id
      in: path
      required: true
    - schema:
        type: integer
        format: int64
      description: >-
        Maximum number of users to return in a single response. Valid range:
        1-100. Server may return fewer users than specified.
      name: page_size
      in: query
    - schema:
        type: string
      description: >-
        Pagination token from a previous ListUserResponse. Used to retrieve the
        next page of results. Leave empty for the first request.
      name: page_token
      in: query
  responses:
    '200':
      description: Successfully retrieved the list of users in the organization
      content:
        application/json:
          schema:
            $ref: ../components/schemas/usersListOrganizationUsersResponse.yaml
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: >-
          ../code_samples/javascript/api_v1_organizations_{organization_id}_users/get.js
    - label: Python SDK
      lang: python
      source:
        $ref: >-
          ../code_samples/python/api_v1_organizations_{organization_id}_users/get.py
    - label: Go SDK
      lang: go
      source:
        $ref: ../code_samples/go/api_v1_organizations_{organization_id}_users/get.go
    - label: Java SDK
      lang: java
      source:
        $ref: >-
          ../code_samples/java/api_v1_organizations_{organization_id}_users/get.java
post:
  description: >-
    Creates a new user account and immediately adds them to the specified
    organization. Use this endpoint when you want to create a user and grant
    them access to an organization in a single operation. You can provide user
    profile information, assign roles, and configure membership metadata. The
    user receives an activation email unless this feature is disabled in the
    organization settings.
  tags:
    - Users
  summary: Create new user in organization
  operationId: UserService_CreateUserAndMembership
  parameters:
    - schema:
        type: string
      name: organization_id
      in: path
      required: true
    - schema:
        type: boolean
      description: If true, sends an activation email to the user. Defaults to true.
      name: send_invitation_email
      in: query
  responses:
    '201':
      description: >-
        User created successfully. Returns the created user object, including
        system-generated identifiers and timestamps
      content:
        application/json:
          schema:
            $ref: ../components/schemas/usersCreateUserAndMembershipResponse.yaml
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: >-
          ../code_samples/javascript/api_v1_organizations_{organization_id}_users/post.js
    - label: Python SDK
      lang: python
      source:
        $ref: >-
          ../code_samples/python/api_v1_organizations_{organization_id}_users/post.py
    - label: Go SDK
      lang: go
      source:
        $ref: >-
          ../code_samples/go/api_v1_organizations_{organization_id}_users/post.go
    - label: Java SDK
      lang: java
      source:
        $ref: >-
          ../code_samples/java/api_v1_organizations_{organization_id}_users/post.java
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/usersCreateUser.yaml
    required: true
