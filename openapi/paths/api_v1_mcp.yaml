get:
  description: >-
    Returns a list of existing MCPs, optionally filtered by
    connected_account_identifier and link_token.
  tags:
    - MCP
  summary: List MCPs
  operationId: McpService_ListMcp
  parameters:
    - schema:
        type: string
      description: Filter by connected account identifier
      name: filter.connected_account_identifier
      in: query
    - schema:
        type: string
      description: Filter by link token
      name: filter.link_token
      in: query
  responses:
    '200':
      description: List of MCPs
      content:
        application/json:
          schema:
            $ref: ../components/schemas/mcpListMcpResponse.yaml
    '400':
      description: Invalid request
      content:
        application/json:
          schema: {}
    '401':
      description: Authentication required
      content:
        application/json:
          schema: {}
post:
  description: >-
    Creates a new MCP for the configuration. If same configuration exists, it
    will return the existing MCP.
  tags:
    - MCP
  summary: Create or retrieve MCP
  operationId: McpService_CreateMcp
  responses:
    '200':
      description: The created or existing MCP
      content:
        application/json:
          schema:
            $ref: ../components/schemas/mcpCreateMcpResponse.yaml
    '400':
      description: Invalid request
      content:
        application/json:
          schema: {}
    '401':
      description: Authentication required
      content:
        application/json:
          schema: {}
  requestBody:
    content:
      application/json:
        schema:
          description: MCP tool configuration to create or update
          $ref: ../components/schemas/mcpMcp.yaml
    required: true
