get:
  description: >-
    Retrieves a comprehensive list of all roles available within the specified
    environment including organization roles. Use this endpoint to view all role
    definitions, including custom roles and their configurations. You can
    optionally include permission details for each role to understand their
    capabilities. This is useful for role management, auditing organization
    access controls, or understanding the available access levels within the
    organization.
  tags:
    - Roles
  summary: List all roles in environment
  operationId: RolesService_ListRoles
  parameters:
    - schema:
        type: string
      description: >-
        Include additional data in the response. Valid values: 'permissions'
        (direct permissions only), 'permissions:all' (includes inherited
        permissions from role hierarchy)
      name: include
      in: query
  responses:
    '200':
      description: >-
        Successfully retrieved list of roles. Returns all roles with their
        metadata and optionally their permissions.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/rolesListRolesResponse.yaml
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: ../code_samples/javascript/api_v1_roles/get.js
    - label: Python SDK
      lang: python
      source:
        $ref: ../code_samples/python/api_v1_roles/get.py
    - label: Go SDK
      lang: go
      source:
        $ref: ../code_samples/go/api_v1_roles/get.go
    - label: Java SDK
      lang: java
      source:
        $ref: ../code_samples/java/api_v1_roles/get.java
post:
  description: >-
    Creates a new role within the environment with specified permissions and
    metadata. Use this endpoint to define custom roles that can be assigned to
    users or groups. You can create hierarchical roles by extending existing
    roles, assign specific permissions, and configure display information. Roles
    are the foundation of your access control system and determine what actions
    users can perform.
  tags:
    - Roles
  summary: Create new role in environment
  operationId: RolesService_CreateRole
  responses:
    '201':
      description: >-
        Role created successfully. Returns the complete role object with
        system-generated ID and timestamps.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/rolesCreateRoleResponse.yaml
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: ../code_samples/javascript/api_v1_roles/post.js
    - label: Python SDK
      lang: python
      source:
        $ref: ../code_samples/python/api_v1_roles/post.py
    - label: Go SDK
      lang: go
      source:
        $ref: ../code_samples/go/api_v1_roles/post.go
    - label: Java SDK
      lang: java
      source:
        $ref: ../code_samples/java/api_v1_roles/post.java
  requestBody:
    content:
      application/json:
        schema:
          description: >-
            Role configuration details including name, display name,
            description, permissions, and inheritance settings.
          $ref: ../components/schemas/v1rolesCreateRole.yaml
          examples:
            - description: Can edit content
              display_name: Content Editor
              name: content_editor
              permissions:
                - read:content
                - write:content
    required: true
