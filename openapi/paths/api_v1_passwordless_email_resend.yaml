post:
  description: >-
    Resend a verification email if the user didn't receive it or if the previous
    code/link has expired
  tags:
    - Magic link & OTP
  summary: Resend passwordless email
  operationId: PasswordlessService_ResendPasswordlessEmail
  responses:
    '200':
      description: >-
        Successfully resent the passwordless authentication email. Returns
        updated authentication request details with new expiration time.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/passwordlessSendPasswordlessResponse.yaml
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: ../code_samples/javascript/api_v1_passwordless_email_resend/post.js
    - label: Python SDK
      lang: python
      source:
        $ref: ../code_samples/python/api_v1_passwordless_email_resend/post.py
    - label: Go SDK
      lang: go
      source:
        $ref: ../code_samples/go/api_v1_passwordless_email_resend/post.go
    - label: Java SDK
      lang: java
      source:
        $ref: ../code_samples/java/api_v1_passwordless_email_resend/post.java
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/passwordlessResendPasswordlessRequest.yaml
    required: true
