get:
  description: >-
    Retrieves detailed information about a specific directory within an
    organization
  tags:
    - Directory
  summary: Get directory details
  operationId: DirectoryService_GetDirectory
  parameters:
    - schema:
        type: string
      description: Unique identifier of the organization
      name: organization_id
      in: path
      required: true
    - schema:
        type: string
      description: Unique identifier of the directory
      name: id
      in: path
      required: true
  responses:
    '200':
      description: Successfully retrieved directory details
      content:
        application/json:
          schema:
            $ref: ../components/schemas/directoriesGetDirectoryResponse.yaml
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: >-
          ../code_samples/javascript/api_v1_organizations_{organization_id}_directories_{id}/get.js
    - label: Python SDK
      lang: python
      source:
        $ref: >-
          ../code_samples/python/api_v1_organizations_{organization_id}_directories_{id}/get.py
    - label: Go SDK
      lang: go
      source:
        $ref: >-
          ../code_samples/go/api_v1_organizations_{organization_id}_directories_{id}/get.go
    - label: Java SDK
      lang: java
      source:
        $ref: >-
          ../code_samples/java/api_v1_organizations_{organization_id}_directories_{id}/get.java
