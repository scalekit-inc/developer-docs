delete:
  description: >-
    Removes a specific permission from the specified role, revoking that
    capability from all users assigned to the role. Use this endpoint to
    restrict role capabilities or remove unnecessary permissions. Provide both
    the role name and permission name as path parameters. This operation only
    affects the direct permission assignment and does not impact permissions
    inherited from base roles. If the permission is inherited through role
    hierarchy, you may need to modify the base role instead. This is useful for
    fine-tuning role permissions, implementing least-privilege access controls,
    or removing deprecated permissions. Returns no content on successful
    removal.
  tags:
    - Roles
  summary: Remove permission from role
  operationId: RolesService_RemovePermissionFromRole
  parameters:
    - schema:
        type: string
      description: Name of the role
      name: role_name
      in: path
      required: true
    - schema:
        type: string
      description: Name of the permission to remove
      name: permission_name
      in: path
      required: true
  responses:
    '200':
      description: Permission removed from role successfully. No content returned.
      content:
        application/json:
          schema: {}
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: >-
          ../code_samples/javascript/api_v1_roles_{role_name}_permissions_{permission_name}/delete.js
    - label: Python SDK
      lang: python
      source:
        $ref: >-
          ../code_samples/python/api_v1_roles_{role_name}_permissions_{permission_name}/delete.py
    - label: Go SDK
      lang: go
      source:
        $ref: >-
          ../code_samples/go/api_v1_roles_{role_name}_permissions_{permission_name}/delete.go
    - label: Java SDK
      lang: java
      source:
        $ref: >-
          ../code_samples/java/api_v1_roles_{role_name}_permissions_{permission_name}/delete.java
