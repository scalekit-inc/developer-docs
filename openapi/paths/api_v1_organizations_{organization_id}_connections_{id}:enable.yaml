patch:
  description: >-
    Activate an existing connection for the specified organization. When
    enabled, users can authenticate using this connection. This endpoint changes
    the connection state from disabled to enabled without modifying other
    configuration settings
  tags:
    - Connections
  summary: Enable SSO connection
  operationId: ConnectionService_EnableConnection
  parameters:
    - schema:
        type: string
      description: Unique identifier of the organization associated with the connection
      name: organization_id
      in: path
      required: true
    - schema:
        type: string
      description: Unique identifier for the connection to be toggled
      name: id
      in: path
      required: true
  responses:
    '200':
      description: Connection enabled successfully
      content:
        application/json:
          schema:
            $ref: ../components/schemas/connectionsToggleConnectionResponse.yaml
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: >-
          ../code_samples/javascript/api_v1_organizations_{organization_id}_connections_{id}:enable/patch.js
    - label: Python SDK
      lang: python
      source:
        $ref: >-
          ../code_samples/python/api_v1_organizations_{organization_id}_connections_{id}:enable/patch.py
    - label: Go SDK
      lang: go
      source:
        $ref: >-
          ../code_samples/go/api_v1_organizations_{organization_id}_connections_{id}:enable/patch.go
    - label: Java SDK
      lang: java
      source:
        $ref: >-
          ../code_samples/java/api_v1_organizations_{organization_id}_connections_{id}:enable/patch.java
