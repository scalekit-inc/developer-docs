patch:
  description: >-
    Updates the default creator and member roles for the current environment.
    Use this endpoint to configure which roles are automatically assigned to new
    users when they join the environment. You can specify role names for both
    creator and member default roles. The system will validate that the
    specified roles exist and update the environment settings accordingly.
    Returns the updated default role objects including their complete role
    information and permissions.
  tags:
    - Roles
  summary: Set default creator and member roles
  operationId: RolesService_UpdateDefaultRoles2
  responses:
    '200':
      description: Default roles updated successfully
      content:
        application/json:
          schema:
            $ref: ../components/schemas/rolesUpdateDefaultRolesResponse.yaml
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/rolesUpdateDefaultRolesRequest.yaml
    required: true
