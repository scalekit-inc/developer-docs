get:
  description: >-
    Retrieves all registered passkeys for the current user, including device
    information, creation timestamps, and display names. Use this to show users
    their registered authenticators.
  tags:
    - Passkeys
  summary: List user's passkeys
  operationId: WebAuthnService_ListCredentials
  parameters:
    - schema:
        type: string
      description: User ID to list credentials for (optional, current user if not provided)
      name: user_id
      in: query
  responses:
    '200':
      description: List of passkeys with metadata
      content:
        application/json:
          schema:
            $ref: ../components/schemas/webauthnListCredentialsResponse.yaml
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: ../code_samples/javascript/api_v1_webauthn_credentials/get.js
    - label: Python SDK
      lang: python
      source:
        $ref: ../code_samples/python/api_v1_webauthn_credentials/get.py
    - label: Go SDK
      lang: go
      source:
        $ref: ../code_samples/go/api_v1_webauthn_credentials/get.go
    - label: Java SDK
      lang: java
      source:
        $ref: ../code_samples/java/api_v1_webauthn_credentials/get.java
