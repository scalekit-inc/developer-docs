get:
  description: >-
    Retrieves a paginated list of API clients for a specific organization.
    Returns client details including metadata, scopes, and secret information
    (without exposing actual secret values).
  tags:
    - API Auth
  summary: List organization API clients
  operationId: ClientService_ListOrganizationClients
  parameters:
    - schema:
        type: string
      description: >-
        Unique identifier of the organization whose clients to list. Must start
        with 'org_' prefix.
      name: organization_id
      in: path
      required: true
    - schema:
        type: integer
        format: int64
      description: >-
        Maximum number of clients to return per page


        Maximum number of API clients to return per page. Must be between 10 and
        100
      name: page_size
      in: query
    - schema:
        type: string
      description: >-
        Pagination token from the previous response


        Pagination token from the previous response. Use to retrieve the next
        page of organization clients
      name: page_token
      in: query
  responses:
    '200':
      description: >-
        List of organization API clients returned successfully. Each client
        includes its configuration details and metadata.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/clientsListOrganizationClientsResponse.yaml
  x-codeSamples:
    - label: Python SDK
      lang: python
      source:
        $ref: >-
          ../code_samples/python/api_v1_organizations_{organization_id}_clients/get.py
post:
  description: >-
    Creates a new API client for an organization. Returns the client details and
    a plain secret (available only once).
  tags:
    - API Auth
  summary: Create organization API client
  operationId: ClientService_CreateOrganizationClient
  parameters:
    - schema:
        type: string
      description: Unique identifier of the organization
      name: organization_id
      in: path
      required: true
  responses:
    '201':
      description: >-
        API client created successfully. Returns the client ID and plain secret
        (only available at creation time). The client can be configured with
        scopes, audience values, and custom claims for fine-grained access
        control.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/clientsCreateOrganizationClientResponse.yaml
  x-codeSamples:
    - label: Python SDK
      lang: python
      source:
        $ref: >-
          ../code_samples/python/api_v1_organizations_{organization_id}_clients/post.py
  requestBody:
    content:
      application/json:
        schema:
          description: Details of the client to be created
          $ref: ../components/schemas/clientsOrganizationClient.yaml
    required: true
