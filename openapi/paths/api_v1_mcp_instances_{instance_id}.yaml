get:
  description: Returns a single MCP instance for the current environment by ID.
  tags:
    - MCP Instances
  summary: Fetch an MCP instance
  operationId: McpService_GetMcpInstance
  parameters:
    - schema:
        type: string
      description: ID of the MCP instance to fetch
      name: instance_id
      in: path
      required: true
  responses:
    '200':
      description: The requested MCP instance
      content:
        application/json:
          schema:
            $ref: ../components/schemas/mcpGetMcpInstanceResponse.yaml
    '400':
      description: Invalid request
      content:
        application/json:
          schema: {}
    '401':
      description: Authentication required
      content:
        application/json:
          schema: {}
    '404':
      description: Not Found - MCP instance does not exist
      content:
        application/json:
          schema: {}
delete:
  description: Deletes a single MCP instance in the current environment.
  tags:
    - MCP Instances
  summary: Delete an MCP instance
  operationId: McpService_DeleteMcpInstance
  parameters:
    - schema:
        type: string
      description: ID of the MCP instance to delete
      name: instance_id
      in: path
      required: true
  responses:
    '200':
      description: MCP instance deleted successfully
      content:
        application/json:
          schema: {}
    '400':
      description: Invalid request
      content:
        application/json:
          schema: {}
    '401':
      description: Authentication required
      content:
        application/json:
          schema: {}
    '404':
      description: Not Found - MCP instance does not exist
      content:
        application/json:
          schema: {}
patch:
  description: >-
    Updates attributes of an MCP instance. Currently only the config name can be
    changed, which rebuilds the instance mappings.
  tags:
    - MCP Instances
  summary: Update an MCP instance
  operationId: McpService_UpdateMcpInstance
  parameters:
    - schema:
        type: string
      description: ID of the MCP instance to update
      name: instance_id
      in: path
      required: true
  responses:
    '200':
      description: The updated MCP instance
      content:
        application/json:
          schema:
            $ref: ../components/schemas/mcpUpdateMcpInstanceResponse.yaml
    '400':
      description: Invalid request
      content:
        application/json:
          schema: {}
    '401':
      description: Authentication required
      content:
        application/json:
          schema: {}
    '404':
      description: Not Found - MCP instance does not exist
      content:
        application/json:
          schema: {}
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/McpServiceUpdateMcpInstanceBody.yaml
    required: true
