get:
  description: >-
    Retrieves the complete configuration and status details for a specific
    connection by its ID within an organization. Returns all connection
    properties including provider settings, protocols, and current status.
  tags:
    - Connections
  summary: Get connection details
  operationId: ConnectionService_GetConnection
  parameters:
    - schema:
        type: string
      description: >-
        Organization identifier (required). Specifies which organization owns
        the connection you want to retrieve.
      name: organization_id
      in: path
      required: true
    - schema:
        type: string
      description: >-
        Connection identifier (required). Specifies which specific connection to
        retrieve from the organization.
      name: id
      in: path
      required: true
  responses:
    '200':
      description: Successfully retrieved connection details for the specified organization
      content:
        application/json:
          schema:
            $ref: ../components/schemas/connectionsGetConnectionResponse.yaml
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: >-
          ../code_samples/javascript/api_v1_organizations_{organization_id}_connections_{id}/get.js
    - label: Python SDK
      lang: python
      source:
        $ref: >-
          ../code_samples/python/api_v1_organizations_{organization_id}_connections_{id}/get.py
    - label: Go SDK
      lang: go
      source:
        $ref: >-
          ../code_samples/go/api_v1_organizations_{organization_id}_connections_{id}/get.go
    - label: Java SDK
      lang: java
      source:
        $ref: >-
          ../code_samples/java/api_v1_organizations_{organization_id}_connections_{id}/get.java
delete:
  description: >-
    Deletes an SSO connection from the specified organization by connection ID.
    Use this endpoint when an identity provider integration is no longer needed
    for the organization. Returns an empty response after the SSO connection is
    deleted successfully.
  tags:
    - Connections
  summary: Delete SSO connection
  operationId: ConnectionService_DeleteConnection
  parameters:
    - schema:
        type: string
      description: Organization ID for the Connection.
      name: organization_id
      in: path
      required: true
    - schema:
        type: string
      description: Connection ID. Unique ID for the connection
      name: id
      in: path
      required: true
  responses:
    '200':
      description: SSO connection deleted successfully
      content:
        application/json:
          schema: {}
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: >-
          ../code_samples/javascript/api_v1_organizations_{organization_id}_connections_{id}/delete.js
    - label: Python SDK
      lang: python
      source:
        $ref: >-
          ../code_samples/python/api_v1_organizations_{organization_id}_connections_{id}/delete.py
    - label: Go SDK
      lang: go
      source:
        $ref: >-
          ../code_samples/go/api_v1_organizations_{organization_id}_connections_{id}/delete.go
    - label: Java SDK
      lang: java
      source:
        $ref: >-
          ../code_samples/java/api_v1_organizations_{organization_id}_connections_{id}/delete.java
