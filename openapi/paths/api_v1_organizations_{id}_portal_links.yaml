put:
  description: >-
    Creates a single use Admin Portal URL valid for 1 minute. Once the generated
    admin portal URL is accessed or rendered, a temporary session of 6 hours is
    created to allow the admin to update SSO/SCIM configuration.
  tags:
    - Organizations
  summary: Generate admin portal link
  operationId: OrganizationService_GeneratePortalLink
  parameters:
    - schema:
        type: string
      description: Organization ID
      name: id
      in: path
      required: true
    - schema:
        type: array
        items:
          enum:
            - dir_sync
            - sso
          type: string
      style: form
      explode: true
      description: >-
        Features to enable in the admin portal link. To enable features, append
        them as URL parameters:


        - Single Sign-On: ?features=sso

        - Directory Sync: ?features=dir_sync

        - Both features: ?features=sso&features=dir_sync


        Example URL: https://scalekit.com/portal/lnk_123?features=sso

         - dir_sync: Enables directory synchronization configuration in the portal
         - sso: Enables Single Sign-On (SSO) configuration in the portal
      name: features
      in: query
  responses:
    '200':
      description: >-
        Admin Portal link generated successfully. Returns the portal URL and
        expiration timestamp.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/organizationsGeneratePortalLinkResponse.yaml
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: >-
          ../code_samples/javascript/api_v1_organizations_{id}_portal_links/put.js
    - label: Python SDK
      lang: python
      source:
        $ref: ../code_samples/python/api_v1_organizations_{id}_portal_links/put.py
    - label: Go SDK
      lang: go
      source:
        $ref: ../code_samples/go/api_v1_organizations_{id}_portal_links/put.go
    - label: Java SDK
      lang: java
      source:
        $ref: ../code_samples/java/api_v1_organizations_{id}_portal_links/put.java
