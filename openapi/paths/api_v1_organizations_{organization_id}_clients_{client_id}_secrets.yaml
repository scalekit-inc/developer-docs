post:
  description: >-
    Creates a new secret for an organization API client. Returns the plain
    secret (available only once).
  tags:
    - API Auth
  summary: Create organization API client secret
  operationId: ClientService_CreateOrganizationClientSecret
  parameters:
    - schema:
        type: string
      description: Unique identifier of the organization
      name: organization_id
      in: path
      required: true
    - schema:
        type: string
      description: Unique identifier of the API client
      name: client_id
      in: path
      required: true
  responses:
    '201':
      description: >-
        Client secret created successfully. Returns the new secret ID and the
        plain secret value (only available at creation time). The secret can be
        used immediately for authentication.
      content:
        application/json:
          schema:
            $ref: >-
              ../components/schemas/clientsCreateOrganizationClientSecretResponse.yaml
  x-codeSamples:
    - label: Python SDK
      lang: python
      source:
        $ref: >-
          ../code_samples/python/api_v1_organizations_{organization_id}_clients_{client_id}_secrets/post.py
