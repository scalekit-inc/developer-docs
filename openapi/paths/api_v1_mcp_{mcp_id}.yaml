get:
  description: Returns the existing MCP with the given ID.
  tags:
    - MCP
  summary: Get MCP by ID
  operationId: McpService_GetMcp
  parameters:
    - schema:
        type: string
      description: ID of the MCP to retrieve
      name: mcp_id
      in: path
      required: true
  responses:
    '200':
      description: The requested MCP
      content:
        application/json:
          schema:
            $ref: ../components/schemas/mcpGetMcpResponse.yaml
    '400':
      description: Invalid request
      content:
        application/json:
          schema: {}
    '401':
      description: Authentication required
      content:
        application/json:
          schema: {}
    '404':
      description: Not Found - MCP does not exist
      content:
        application/json:
          schema: {}
delete:
  description: Deletes the MCP with the given ID.
  tags:
    - MCP
  summary: Delete MCP by ID
  operationId: McpService_DeleteMcp
  parameters:
    - schema:
        type: string
      description: ID of the MCP to delete
      name: mcp_id
      in: path
      required: true
  responses:
    '200':
      description: MCP deleted successfully
      content:
        application/json:
          schema: {}
    '400':
      description: Invalid request
      content:
        application/json:
          schema: {}
    '401':
      description: Authentication required
      content:
        application/json:
          schema: {}
    '404':
      description: Not Found - MCP does not exist
      content:
        application/json:
          schema: {}
