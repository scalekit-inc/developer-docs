patch:
  description: >-
    Activates a directory within an organization, allowing it to synchronize
    users and groups with the connected Directory provider
  tags:
    - Directory
  summary: Enable a directory
  operationId: DirectoryService_EnableDirectory
  parameters:
    - schema:
        type: string
      description: >-
        A unique identifier for the organization. The value must begin with
        'org_' and be between 1 and 32 characters long
      name: organization_id
      in: path
      required: true
    - schema:
        type: string
      description: >-
        A unique identifier for a directory within the organization. The value
        must begin with 'dir_' and be between 1 and 32 characters long
      name: id
      in: path
      required: true
  responses:
    '200':
      description: Success
      content:
        application/json:
          schema:
            $ref: ../components/schemas/directoriesToggleDirectoryResponse.yaml
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: >-
          ../code_samples/javascript/api_v1_organizations_{organization_id}_directories_{id}:enable/patch.js
    - label: Python SDK
      lang: python
      source:
        $ref: >-
          ../code_samples/python/api_v1_organizations_{organization_id}_directories_{id}:enable/patch.py
    - label: Go SDK
      lang: go
      source:
        $ref: >-
          ../code_samples/go/api_v1_organizations_{organization_id}_directories_{id}:enable/patch.go
    - label: Java SDK
      lang: java
      source:
        $ref: >-
          ../code_samples/java/api_v1_organizations_{organization_id}_directories_{id}:enable/patch.java
