patch:
  description: >-
    Updates configuration settings for an organization. Supports modifying SSO
    configuration, directory synchronization settings, and session parameters.
    Requires organization ID and the specific settings to update.
  tags:
    - Organizations
  summary: Toggle organization settings
  operationId: OrganizationService_UpdateOrganizationSettings
  parameters:
    - schema:
        type: string
      description: >-
        Unique identifier of the organization to update settings. Must begin
        with 'org_' prefix
      name: id
      in: path
      required: true
  responses:
    '200':
      description: >-
        Returns the complete organization object with updated settings applied.
        Contains all organization details including ID, display name, and the
        modified settings.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/organizationsGetOrganizationResponse.yaml
    '400':
      description: >-
        Invalid request - occurs when the settings payload contains invalid
        values or unsupported configuration
      content:
        application/json:
          schema: {}
    '404':
      description: Organization not found - the specified organization ID doesn't exist
      content:
        application/json:
          schema: {}
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: ../code_samples/javascript/api_v1_organizations_{id}_settings/patch.js
    - label: Python SDK
      lang: python
      source:
        $ref: ../code_samples/python/api_v1_organizations_{id}_settings/patch.py
    - label: Go SDK
      lang: go
      source:
        $ref: ../code_samples/go/api_v1_organizations_{id}_settings/patch.go
    - label: Java SDK
      lang: java
      source:
        $ref: ../code_samples/java/api_v1_organizations_{id}_settings/patch.java
  requestBody:
    content:
      application/json:
        schema:
          description: >-
            Settings configuration to apply to the organization. Contains
            feature toggles for SSO, directory synchronization, and other
            organization capabilities
          $ref: ../components/schemas/organizationsOrganizationSettings.yaml
          examples:
            - features:
                - enabled: true
                  name: sso
                - enabled: false
                  name: directory_sync
    required: true
