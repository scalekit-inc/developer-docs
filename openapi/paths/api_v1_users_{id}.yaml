get:
  description: >-
    Retrieves all details for a user by system-generated user ID or external ID.
    The response includes organization memberships and user metadata.
  tags:
    - Users
  summary: Get user
  operationId: UserService_GetUser
  parameters:
    - schema:
        type: string
      description: System-generated user ID
      name: id
      in: path
      required: true
    - schema:
        type: string
      description: >-
        Your application's unique identifier for this organization, used to link
        Scalekit with your system.
      name: external_id
      in: query
  responses:
    '200':
      description: >-
        User details retrieved successfully. Returns full user object with
        system-generated fields and timestamps.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/usersGetUserResponse.yaml
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: ../code_samples/javascript/api_v1_users_{id}/get.js
    - label: Python SDK
      lang: python
      source:
        $ref: ../code_samples/python/api_v1_users_{id}/get.py
    - label: Go SDK
      lang: go
      source:
        $ref: ../code_samples/go/api_v1_users_{id}/get.go
    - label: Java SDK
      lang: java
      source:
        $ref: ../code_samples/java/api_v1_users_{id}/get.java
delete:
  description: >-
    Permanently removes a user from your environment and deletes all associated
    data. Use this endpoint when you need to completely remove a user account.
    This action deletes the user's profile, memberships, and all related data
    across all organizations. This operation cannot be undone, so use with
    caution.
  tags:
    - Users
  summary: Delete user permanently
  operationId: UserService_DeleteUser
  parameters:
    - schema:
        type: string
      description: System-generated user ID. Must start with 'usr_' (19-25 characters)
      name: id
      in: path
      required: true
    - schema:
        type: string
      description: >-
        External system identifier from connected directories. Must match
        existing records
      name: external_id
      in: query
  responses:
    '200':
      description: User successfully deleted. No content returned
      content:
        application/json:
          schema: {}
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: ../code_samples/javascript/api_v1_users_{id}/delete.js
    - label: Python SDK
      lang: python
      source:
        $ref: ../code_samples/python/api_v1_users_{id}/delete.py
    - label: Go SDK
      lang: go
      source:
        $ref: ../code_samples/go/api_v1_users_{id}/delete.go
    - label: Java SDK
      lang: java
      source:
        $ref: ../code_samples/java/api_v1_users_{id}/delete.java
patch:
  description: >-
    Modifies user account information including profile details, metadata, and
    external ID. Use this endpoint to update a user's personal information,
    contact details, or custom metadata. You can update the user's profile,
    phone number, and metadata fields. Note that fields like user ID, email
    address, environment ID, and creation time cannot be modified.
  tags:
    - Users
  summary: Update user information
  operationId: UserService_UpdateUser
  parameters:
    - schema:
        type: string
      description: >-
        System-generated user ID. Must start with 'usr_' and be 19-25 characters
        long.
      name: id
      in: path
      required: true
    - schema:
        type: string
      description: >-
        Your application's unique identifier for this organization, used to link
        Scalekit with your system.
      name: external_id
      in: query
  responses:
    '200':
      description: >-
        User updated successfully. Returns the modified user object with updated
        timestamps.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/usersUpdateUserResponse.yaml
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: ../code_samples/javascript/api_v1_users_{id}/patch.js
    - label: Python SDK
      lang: python
      source:
        $ref: ../code_samples/python/api_v1_users_{id}/patch.py
    - label: Go SDK
      lang: go
      source:
        $ref: ../code_samples/go/api_v1_users_{id}/patch.go
    - label: Java SDK
      lang: java
      source:
        $ref: ../code_samples/java/api_v1_users_{id}/patch.java
  requestBody:
    content:
      application/json:
        schema:
          description: >-
            User fields to update. Only specified fields will be modified.
            Required fields must be provided if being changed.
          $ref: ../components/schemas/v1usersUpdateUser.yaml
          examples:
            - firstName: John
              lastName: Doe
    required: true
