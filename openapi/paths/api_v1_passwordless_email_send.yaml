post:
  description: >-
    Send a verification email containing either a verification code (OTP), magic
    link, or both to a user's email address
  tags:
    - Magic link & OTP
  summary: Send passwordless email
  operationId: PasswordlessService_SendPasswordlessEmail
  responses:
    '200':
      description: >-
        Successfully sent passwordless authentication email. Returns the
        authentication request details including expiration time and auth
        request ID
      content:
        application/json:
          schema:
            $ref: ../components/schemas/passwordlessSendPasswordlessResponse.yaml
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: ../code_samples/javascript/api_v1_passwordless_email_send/post.js
    - label: Python SDK
      lang: python
      source:
        $ref: ../code_samples/python/api_v1_passwordless_email_send/post.py
    - label: Go SDK
      lang: go
      source:
        $ref: ../code_samples/go/api_v1_passwordless_email_send/post.go
    - label: Java SDK
      lang: java
      source:
        $ref: ../code_samples/java/api_v1_passwordless_email_send/post.java
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/passwordlessSendPasswordlessRequest.yaml
    required: true
