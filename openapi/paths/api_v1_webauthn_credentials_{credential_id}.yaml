delete:
  description: >-
    Deletes a specific passkey credential for the current user. After removal,
    the authenticator can no longer be used for authentication.
  tags:
    - Passkeys
  summary: Remove a passkey
  operationId: WebAuthnService_DeleteCredential
  parameters:
    - schema:
        type: string
      description: The credential ID to delete
      name: credential_id
      in: path
      required: true
  responses:
    '200':
      description: Passkey successfully deleted
      content:
        application/json:
          schema:
            $ref: ../components/schemas/webauthnDeleteCredentialResponse.yaml
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: >-
          ../code_samples/javascript/api_v1_webauthn_credentials_{credential_id}/delete.js
    - label: Python SDK
      lang: python
      source:
        $ref: >-
          ../code_samples/python/api_v1_webauthn_credentials_{credential_id}/delete.py
    - label: Go SDK
      lang: go
      source:
        $ref: >-
          ../code_samples/go/api_v1_webauthn_credentials_{credential_id}/delete.go
    - label: Java SDK
      lang: java
      source:
        $ref: >-
          ../code_samples/java/api_v1_webauthn_credentials_{credential_id}/delete.java
patch:
  description: >-
    Updates the display name of a passkey credential to help users identify
    their authenticators. Only the display name can be modified.
  tags:
    - Passkeys
  summary: Rename a passkey
  operationId: WebAuthnService_UpdateCredential
  parameters:
    - schema:
        type: string
      description: The credential ID to update
      name: credential_id
      in: path
      required: true
  responses:
    '200':
      description: Passkey successfully updated with new name
      content:
        application/json:
          schema:
            $ref: ../components/schemas/webauthnUpdateCredentialResponse.yaml
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: >-
          ../code_samples/javascript/api_v1_webauthn_credentials_{credential_id}/patch.js
    - label: Python SDK
      lang: python
      source:
        $ref: >-
          ../code_samples/python/api_v1_webauthn_credentials_{credential_id}/patch.py
    - label: Go SDK
      lang: go
      source:
        $ref: >-
          ../code_samples/go/api_v1_webauthn_credentials_{credential_id}/patch.go
    - label: Java SDK
      lang: java
      source:
        $ref: >-
          ../code_samples/java/api_v1_webauthn_credentials_{credential_id}/patch.java
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/WebAuthnServiceUpdateCredentialBody.yaml
    required: true
