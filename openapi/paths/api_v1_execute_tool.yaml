post:
  description: >-
    Executes a tool action using authentication credentials from a connected
    account. Specify the tool by name and provide required parameters as JSON.
    The connected account can be identified by ID, or by combination of
    organization/user, connector, and identifier. Returns the execution result
    data and a unique execution ID for tracking. Use this endpoint to perform
    actions like sending emails, creating calendar events, or managing resources
    in external services.
  tags:
    - Connected Accounts
  summary: Execute a tool using a connected account
  operationId: ToolService_ExecuteTool
  responses:
    '200':
      description: Tool executed successfully with result data and execution ID
      content:
        application/json:
          schema:
            $ref: ../components/schemas/toolsExecuteToolResponse.yaml
    '400':
      description: >-
        Invalid request - occurs when tool name is missing, parameters are
        malformed, or tool definition validation fails
      content:
        application/json:
          schema: {}
    '401':
      description: Authentication required - missing or invalid access token
      content:
        application/json:
          schema: {}
    '404':
      description: >-
        Tool or connected account not found - occurs when the specified tool
        name or connected account does not exist
      content:
        application/json:
          schema: {}
    '500':
      description: >-
        Tool execution failed - occurs when the external service returns an
        error or the tool encounters a runtime exception
      content:
        application/json:
          schema: {}
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/toolsExecuteToolRequest.yaml
    required: true
