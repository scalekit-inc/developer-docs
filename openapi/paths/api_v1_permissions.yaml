get:
  description: >-
    Retrieves a comprehensive, paginated list of all permissions available
    within the environment. Use this endpoint to view all permission definitions
    for auditing, role management, or understanding the complete set of
    available access controls. The response includes pagination tokens to
    navigate through large sets of permissions efficiently. Each permission
    object contains the permission name, description, creation time, and last
    update time. This operation is useful for building permission selection
    interfaces, auditing permission usage, or understanding the scope of
    available access controls in your RBAC system.
  tags:
    - Permissions
  summary: List all permissions
  operationId: RolesService_ListPermissions
  parameters:
    - schema:
        type: string
      description: Page token to retrieve next page of results
      name: page_token
      in: query
    - schema:
        type: integer
        format: int64
      description: Number of permissions to return per page (max 100)
      name: page_size
      in: query
    - schema:
        type: string
        enum:
          - SCALEKIT
          - ENVIRONMENT
      description: >-
        Filter permissions by type: ALL, SCALEKIT, or ENVIRONMENT, where
        SCALEKIT are predefined Scalekit permissions and ENVIRONMENT are custom
        permissions created in the environment, default is ALL
      name: type
      in: query
  responses:
    '200':
      description: >-
        Successfully retrieved the list of permissions. Returns a paginated list
        of permission objects with metadata and pagination tokens for
        navigation.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/rolesListPermissionsResponse.yaml
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: ../code_samples/javascript/api_v1_permissions/get.js
    - label: Python SDK
      lang: python
      source:
        $ref: ../code_samples/python/api_v1_permissions/get.py
    - label: Go SDK
      lang: go
      source:
        $ref: ../code_samples/go/api_v1_permissions/get.go
    - label: Java SDK
      lang: java
      source:
        $ref: ../code_samples/java/api_v1_permissions/get.java
post:
  description: >-
    Creates a new permission that represents a specific action users can perform
    within the environment. Use this endpoint to define granular access controls
    for your RBAC system. You can provide a unique permission name following the
    format 'action:resource' (for example, 'read:documents', 'write:users') and
    an optional description explaining the permission's purpose. The permission
    name must be unique across the environment and follows alphanumeric naming
    conventions with colons and underscores. Returns the created permission
    object including system-generated ID and timestamps.
  tags:
    - Permissions
  summary: Create new permission
  operationId: RolesService_CreatePermission
  responses:
    '201':
      description: >-
        Permission created successfully. Returns the complete permission object
        with system-generated ID, name, description, and timestamps.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/rolesCreatePermissionResponse.yaml
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: ../code_samples/javascript/api_v1_permissions/post.js
    - label: Python SDK
      lang: python
      source:
        $ref: ../code_samples/python/api_v1_permissions/post.py
    - label: Go SDK
      lang: go
      source:
        $ref: ../code_samples/go/api_v1_permissions/post.go
    - label: Java SDK
      lang: java
      source:
        $ref: ../code_samples/java/api_v1_permissions/post.java
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/v1rolesCreatePermission.yaml
    required: true
