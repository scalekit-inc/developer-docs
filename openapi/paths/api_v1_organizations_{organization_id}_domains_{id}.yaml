get:
  description: >+
    Retrieves complete details for a domain including domain type, timestamps,
    and configuration information.

  tags:
    - Domains
  summary: Get Domain
  operationId: DomainService_GetDomain
  parameters:
    - schema:
        type: string
      description: >-
        Scalekit-generated unique identifier for the organization. Use either
        this or external_id to identify the organization.
      name: organization_id
      in: path
      required: true
    - schema:
        type: string
      description: Scalekit-generated unique identifier of the domain to retrieve.
      name: id
      in: path
      required: true
  responses:
    '200':
      description: Successfully retrieved the domain details.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/domainsGetDomainResponse.yaml
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: >-
          ../code_samples/javascript/api_v1_organizations_{organization_id}_domains_{id}/get.js
    - label: Python SDK
      lang: python
      source:
        $ref: >-
          ../code_samples/python/api_v1_organizations_{organization_id}_domains_{id}/get.py
    - label: Go SDK
      lang: go
      source:
        $ref: >-
          ../code_samples/go/api_v1_organizations_{organization_id}_domains_{id}/get.go
    - label: Java SDK
      lang: java
      source:
        $ref: >-
          ../code_samples/java/api_v1_organizations_{organization_id}_domains_{id}/get.java
delete:
  description: >+
    Permanently removes a domain record from an organization.


    - Deleting an ORGANIZATION_DOMAIN disables SSO routing/enforcement for that
    domain.

    - Deleting an ALLOWED_EMAIL_DOMAIN stops organization suggestions for users
    with that email domain.

  tags:
    - Domains
  summary: Delete Domain
  operationId: DomainService_DeleteDomain
  parameters:
    - schema:
        type: string
      description: >-
        Scalekit-generated unique identifier for the organization. Use either
        this or external_id to identify the organization.
      name: organization_id
      in: path
      required: true
    - schema:
        type: string
      description: >-
        Scalekit-generated unique identifier of the domain to be permanently
        deleted.
      name: id
      in: path
      required: true
  responses:
    '200':
      description: Domain successfully deleted.
      content:
        application/json:
          schema: {}
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: >-
          ../code_samples/javascript/api_v1_organizations_{organization_id}_domains_{id}/delete.js
    - label: Python SDK
      lang: python
      source:
        $ref: >-
          ../code_samples/python/api_v1_organizations_{organization_id}_domains_{id}/delete.py
    - label: Go SDK
      lang: go
      source:
        $ref: >-
          ../code_samples/go/api_v1_organizations_{organization_id}_domains_{id}/delete.go
    - label: Java SDK
      lang: java
      source:
        $ref: >-
          ../code_samples/java/api_v1_organizations_{organization_id}_domains_{id}/delete.java
