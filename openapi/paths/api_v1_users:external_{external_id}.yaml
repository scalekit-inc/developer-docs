get:
  description: >-
    Retrieves all details for a user by your application's external identifier.
    Use this endpoint when you store users in Scalekit using your own system's
    identifiers and need to retrieve the Scalekit user record. The response
    includes organization memberships and user metadata.
  tags:
    - Users
  summary: Get user by external ID
  operationId: UserService_GetUser2
  parameters:
    - schema:
        type: string
      description: >-
        Your application's unique identifier for this user, used to link
        Scalekit with your system.
      name: external_id
      in: path
      required: true
  responses:
    '200':
      description: >-
        User details retrieved successfully. Returns full user object with
        system-generated fields and timestamps.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/usersGetUserResponse.yaml
delete:
  description: >-
    Permanently removes a user identified by your application's external
    identifier. This action deletes the user's profile, memberships, and all
    related data across all organizations. This operation cannot be undone.
  tags:
    - Users
  summary: Delete user by external ID
  operationId: UserService_DeleteUser2
  parameters:
    - schema:
        type: string
      description: >-
        External system identifier from connected directories. Must match
        existing records
      name: external_id
      in: path
      required: true
  responses:
    '200':
      description: User successfully deleted. No content returned
      content:
        application/json:
          schema: {}
patch:
  description: >-
    Modifies user account information for a user identified by your
    application's external identifier. Use this endpoint to keep user profile
    data in sync from your system without needing to store Scalekit's internal
    user ID. You can update the user's profile, phone number, and metadata
    fields.
  tags:
    - Users
  summary: Update user by external ID
  operationId: UserService_UpdateUser2
  parameters:
    - schema:
        type: string
      description: >-
        Your application's unique identifier for this user, used to link
        Scalekit with your system.
      name: external_id
      in: path
      required: true
  responses:
    '200':
      description: >-
        User updated successfully. Returns the modified user object with updated
        timestamps.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/usersUpdateUserResponse.yaml
  requestBody:
    content:
      application/json:
        schema:
          description: >-
            User fields to update. Only specified fields will be modified.
            Required fields must be provided if being changed.
          $ref: ../components/schemas/v1usersUpdateUser.yaml
          examples:
            - firstName: John
              lastName: Doe
    required: true
