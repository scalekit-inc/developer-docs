patch:
  description: >-
    Updates the default member role for the specified organization. Use this
    endpoint to configure which role is automatically assigned to new users when
    they join the organization. The system will validate that the specified role
    exists and update the organization settings accordingly. This configuration
    affects all new user invitations and memberships within the organization.
  tags:
    - Roles
  summary: Set default organization roles
  operationId: RolesService_UpdateDefaultOrganizationRoles
  parameters:
    - schema:
        type: string
      description: Unique identifier of the organization
      name: org_id
      in: path
      required: true
  responses:
    '200':
      description: >-
        Default organization roles updated successfully. Returns the updated
        default member role object with complete role information.
      content:
        application/json:
          schema:
            $ref: >-
              ../components/schemas/rolesUpdateDefaultOrganizationRolesResponse.yaml
  x-codeSamples:
    - label: Node.js SDK
      lang: javascript
      source:
        $ref: >-
          ../code_samples/javascript/api_v1_organizations_{org_id}_roles:set_defaults/patch.js
    - label: Python SDK
      lang: python
      source:
        $ref: >-
          ../code_samples/python/api_v1_organizations_{org_id}_roles:set_defaults/patch.py
    - label: Go SDK
      lang: go
      source:
        $ref: >-
          ../code_samples/go/api_v1_organizations_{org_id}_roles:set_defaults/patch.go
    - label: Java SDK
      lang: java
      source:
        $ref: >-
          ../code_samples/java/api_v1_organizations_{org_id}_roles:set_defaults/patch.java
  requestBody:
    content:
      application/json:
        schema:
          $ref: >-
            ../components/schemas/RolesServiceUpdateDefaultOrganizationRolesBody.yaml
    required: true
