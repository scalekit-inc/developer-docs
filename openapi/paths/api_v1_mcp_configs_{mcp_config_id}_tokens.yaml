post:
  description: >-
    Mints a short-lived JWT that represents a user identifier across the
    connected accounts associated with an MCP configuration. The supplied
    identifier becomes the token's `sub` claim; the token's `aud` claim is the
    MCP server URL bound to the configuration. Claims also carry the MCP
    configuration ID (`mcp_cfg`) and the list of resolved connected-account IDs
    (`ca_ids`). Use this operation to issue a single credential an MCP server
    can present on the user's behalf when calling provider tools. The mint fails
    if any connection mapped to the configuration has no active connected
    account for the identifier.
  tags:
    - mcp-configs
  summary: Create an MCP session token
  operationId: McpService_CreateMcpSessionToken
  parameters:
    - schema:
        type: string
      description: >-
        Unique ID of the MCP configuration whose connections back the token. The
        configuration must exist in the caller's environment.
      name: mcp_config_id
      in: path
      required: true
  responses:
    '200':
      description: >-
        Token created successfully; returns the signed JWT and its absolute
        expiry
      content:
        application/json:
          schema:
            $ref: ../components/schemas/mcpCreateMcpSessionTokenResponse.yaml
    '400':
      description: >-
        Invalid request - mcp_config_id or identifier is missing or malformed,
        expiry is outside the 60s-24h window, the MCP configuration has no
        connections, or a connection has no active connected account for the
        supplied identifier
      content:
        application/json:
          schema: {}
    '404':
      description: >-
        Not Found - no MCP configuration exists with the supplied ID in the
        caller's environment
      content:
        application/json:
          schema: {}
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/McpServiceCreateMcpSessionTokenBody.yaml
    required: true
