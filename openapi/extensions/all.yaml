# Combined API reference — all endpoints, all webhooks.
# No include.tags = keep everything; the plugin only injects code samples
# and merges any root/info extensions declared here.
info:
  title: Scalekit API Reference
  description: |
    # Overview

    The Scalekit API is a RESTful API that covers both **AgentKit** (AI-agent OAuth, tool calling, connected accounts) and **SaaSKit** (organizations, users, SSO, directory sync, RBAC, sessions).

    All requests must use HTTPS. All API requests use the following base URLs:

    ```
    https://{your-subdomain}.scalekit.dev (Development)
    https://{your-subdomain}.scalekit.com (Production)
    https://auth.yourapp.com (Custom domain)
    ```

    ## Authentication

    Scalekit uses OAuth 2.0 Client Credentials for API authentication.

    ```sh
    curl -X POST https://<SCALEKIT_ENVIRONMENT_URL>/oauth/token \
      -H 'Content-Type: application/x-www-form-urlencoded' \
      -d 'client_id={client_id}' \
      -d 'client_secret={client_secret}' \
      -d 'grant_type=client_credentials'
    ```

    ## Product-specific references

    - [AgentKit APIs](https://docs.scalekit.com/agentkit/apis/) — Connected accounts, connectors, tool calling, MCP configurations
    - [SaaSKit APIs](https://docs.scalekit.com/saaskit/apis/) — Organizations, users, SSO, directory sync, RBAC, sessions
