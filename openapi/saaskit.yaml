tags:
  - description: >
      Organization represents a customer or a tenant of your product. This is
      the top level entity and all resources are mapped to this Organization
      object. Each organization is uniquely identified by `organization_id`.


      <!-- ## Organization Attributes


      | Attribute Name             | Attribute
      Description                                                                                                                       
      |

      | -------------------------- |
      --------------------------------------------------------------------------------------------------------------------------------------------
      |

      | `id`<br>_string_           | Unique ID of an Organization. Required for
      all API operations against this
      organization.                                                     |

      | `display_name`<br>_string_ | Name of the
      Organization                                                                                                                    
      |

      | `create_time`<br>_string_  | Creation timestamp in [ISO
      8601](https://en.wikipedia.org/wiki/ISO_8601) format.<br>Example:
      `2011-10-05T14:48:00.000Z`                      |

      | `update_time`<br>_string_  | Last update timestamp in [ISO
      8601](https://en.wikipedia.org/wiki/ISO_8601) format.<br>Example:
      `2021-10-05T14:48:00.000Z`                   |

      | `external_id`<br>_string_  | Your system's unique ID for this
      organization. You can use this to fetch Organization and Connection
      details without storing Scalekit's IDs. |

      | `metadata`<br>_object_     | Additional organization information stored
      as JSON.<br>Example:
      `{"key":"value"}`                                                           
      |

      | `region_code`<br>_string_  | Data center region where organization data
      is stored. Currently always returns
      `US`.                                                         | -->
    name: Organizations
  - description: >-
      Permission management for defining and controlling access to system
      resources. Create, retrieve, update, and delete granular permissions that
      represent specific actions users can perform. Permissions are the building
      blocks of role-based access control (RBAC) and can be assigned to roles to
      grant users the ability to perform specific operations. Use this service
      to define custom permissions for your application's unique access control
      requirements.
    name: Permissions
  - description: >-
      Comprehensive user management operations including user lifecycle,
      organization memberships, and invitation workflows. This service provides
      endpoints for creating, retrieving, updating, and deleting user accounts
      across your Scalekit environment. It supports both individual user
      operations and bulk operations for user administration, including user
      search, pagination, and metadata management. The service also handles user
      invitations and organization membership management.
    name: Users
  - description: >-
      Manage enterprise connections for your Scalekit environment. This service
      provides endpoints for retrieving, and updating connections.
    name: Connections
  - description: >-
      Directory management for viewing and controlling external identity
      provider connections in your Scalekit environment. This service provides
      endpoints for retrieving directory information, listing directories and
      their contents, and enabling or disabling directory synchronization.
    name: Directory
  - description: >-
      Role-based access control (RBAC) for defining and managing permissions in
      an environment. Create and update custom roles with explicit permissions,
      model role hierarchies through inheritance, view dependent roles, manage
      role-permission assignments, and list roles and permissions. Also provides
      a utility to count users assigned to a role.
    name: Roles
  - description: >-
      Comprehensive session management for user authentication and
      authorization. This service provides endpoints for retrieving session
      details, managing user sessions across devices, revoking individual
      sessions, and terminating all active sessions for a user. It supports
      session auditing, device tracking, and security monitoring with detailed
      session metadata including device information, IP geolocation, and
      activity timestamps.
    name: Sessions
  - description: >
      Manage organization-level domains. Scalekit supports two domain types:


      - ORGANIZATION_DOMAIN: Used for SSO domain discovery. When a user signs in
      with a matching email domain, Scalekit routes them to the organization’s
      SSO provider and enforces SSO.

      - ALLOWED_EMAIL_DOMAIN: Used to mark trusted email domains for an
      organization. When a user signs in or signs up with a matching domain,
      Scalekit suggests the organization in the organization switcher
      (authentication-method agnostic).
    name: Domains
  - description: >-
      Endpoints for managing API client applications. API clients enable secure,
      automated interactions between software systems without human
      intervention. Each client is uniquely identified by a `client_id` and can
      be configured with authentication settings, redirect URIs, and security
      parameters. Use these endpoints to create, manage, and configure API
      clients for your API clients.
    name: API Auth
    externalDocs:
      url: https://docs.scalekit.com/m2m/overview
  - description: >-
      Endpoints for sending and verifying passwordless authentication emails.
      These APIs allow users to authenticate without passwords by receiving a
      verification code or magic link in their email.
    name: Magic link & OTP
  - description: Endpoints for passkey-based authentication using WebAuthn/FIDO2 standards.
    name: Passkeys

externalDocs:
  description: Scalekit Docs
  url: https://docs.scalekit.com/
openapi: 3.1.1
servers:
  - url: https://$SCALEKIT_ENVIRONMENT_URL
components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://$SCALEKIT_ENVIRONMENT_URL/oauth/token
          scopes:
            '': No scope required for client credentials flow
x-scalar-environments:
  production:
    variables:
      SCALEKIT_ENVIRONMENT_URL:
        default: https://$SCALEKIT_ENVIRONMENT_URL
        description: yourapp.scalekit.com
  staging:
    variables:
      SCALEKIT_ENVIRONMENT_URL:
        default: https://$SCALEKIT_ENVIRONMENT_URL
        description: yourapp.scalekit.dev
x-scalar-active-environment: staging
