services:
  - type: web
    name: scalekit-chatbot-api
    runtime: node
    rootDir: services/chatbot-api
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYLON_API_TOKEN
        sync: false
      - key: DOCS_BASE_URL
        value: https://docs.scalekit.com
      - key: PYLON_API_URL
        value: https://api.usepylon.com
      - key: PORT
        value: 3001
      - key: NODE_VERSION
        value: 20
